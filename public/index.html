<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TODD'S WITNESSES</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#060608;font-family:'VT323',monospace;}
body::after{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);}

#room{position:fixed;inset:0;z-index:0;
  background-image:url('room.jpg');
  background-size:cover;background-position:center;transition:filter 0.5s ease;}
#room.blurred{filter:blur(5px) brightness(0.45);}
#room::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(0,0,0,0.1) 0%,rgba(0,0,0,0.55) 100%);}

#site-title{position:fixed;top:28px;left:36px;z-index:10;pointer-events:none;}
#site-title h1{font-family:'Bebas Neue',cursive;font-size:52px;letter-spacing:6px;color:#FFD600;
  line-height:1;text-shadow:3px 3px 0 #000;animation:glitch-base 7s infinite;position:relative;display:inline-block;}
#site-title h1::before,#site-title h1::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;font-family:inherit;font-size:inherit;letter-spacing:inherit;}
#site-title h1::before{color:#ff003c;animation:glitch-r 7s infinite;clip-path:polygon(0 15%,100% 15%,100% 38%,0 38%);}
#site-title h1::after{color:#00f5ff;animation:glitch-b 7s infinite;clip-path:polygon(0 62%,100% 62%,100% 82%,0 82%);}
#site-title p{font-size:14px;letter-spacing:4px;color:rgba(255,255,255,0.3);margin-top:2px;text-transform:uppercase;}

@keyframes glitch-base{0%,89%,100%{transform:none;opacity:1}90%{transform:skewX(-3deg) translateX(2px);opacity:.9}91%{transform:skewX(2deg) translateX(-2px)}92%{transform:none}93%{transform:translateX(3px) skewX(-1deg);opacity:.95}94%,95%{transform:none}}
@keyframes glitch-r{0%,89%,100%{transform:none;opacity:0}90%{transform:translateX(-4px);opacity:.8}91%{transform:translateX(3px);opacity:.5}92%,95%{opacity:0}93%{transform:translateX(-5px);opacity:.6}}
@keyframes glitch-b{0%,91%,100%{transform:none;opacity:0}92%{transform:translateX(5px);opacity:.8}93%{transform:translateX(-3px);opacity:.4}94%,97%{opacity:0}95%{transform:translateX(4px);opacity:.5}}

/* PC screen → view.html */
#tv-hotspot{position:fixed;left:1.9%;top:7.5%;width:14%;height:29%;z-index:10;cursor:pointer;
  clip-path:polygon(1% 3%, 96% 0%, 100% 94%, 0% 100%);}
/* Notepad → app.html */
#computer-hotspot{position:fixed;left:23%;top:66%;width:15.5%;height:20%;z-index:10;cursor:pointer;
  clip-path:polygon(7% 9%, 100% 0%, 93% 100%, 0% 100%);}
#tv-hotspot::before,#computer-hotspot::before{content:'';position:absolute;inset:-4px;border:2px solid rgba(106,163,255,0);animation:monitor-pulse 3s ease-in-out infinite;}
@keyframes monitor-pulse{0%,100%{border-color:rgba(106,163,255,0);box-shadow:0 0 0 0 rgba(106,163,255,0);}50%{border-color:rgba(106,163,255,0.35);box-shadow:0 0 18px 4px rgba(106,163,255,0.15);}}
#tv-hotspot::after,#computer-hotspot::after{content:'';position:absolute;inset:0;background:rgba(80,140,255,0);transition:background 0.3s;}
#tv-hotspot:hover::after,#computer-hotspot:hover::after{background:rgba(80,140,255,0.12);}
.hint{position:absolute;bottom:-38px;left:50%;transform:translateX(-50%) translateY(4px);
  background:rgba(0,0,0,0.85);border:1px solid #FFD600;color:#FFD600;
  font-size:17px;padding:3px 14px;white-space:nowrap;opacity:0;
  transition:opacity 0.2s,transform 0.2s;pointer-events:none;letter-spacing:2px;}
#tv-hotspot:hover .hint,#computer-hotspot:hover .hint{opacity:1;transform:translateX(-50%) translateY(0);}

#enter-hint{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  animation:float-up 2.5s ease-in-out infinite;pointer-events:none;}
#enter-hint span{font-size:14px;letter-spacing:4px;color:rgba(255,255,255,0.3);text-transform:uppercase;}
#enter-hint .arrow{font-size:22px;color:rgba(255,255,255,0.2);}
@keyframes float-up{0%,100%{transform:translateX(-50%) translateY(0);opacity:0.6;}50%{transform:translateX(-50%) translateY(-8px);opacity:1;}}

#login-modal{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;}
#login-modal.show{display:flex;}
.login-box{background:#111114;border-top:2px solid #555;border-left:2px solid #555;border-right:2px solid #111;border-bottom:2px solid #111;width:360px;max-width:92vw;overflow:hidden;animation:box-in 0.25s cubic-bezier(0.2,0,0,1);}
@keyframes box-in{from{transform:scale(0.92) translateY(12px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.login-titlebar{background:#2a2a2a;border-bottom:1px solid #111;padding:5px 12px;display:flex;align-items:center;gap:8px;font-size:14px;color:#bbb;letter-spacing:1px;}
.dot{width:10px;height:10px;border-radius:50%;}
.dot.r{background:#ff5f56;}.dot.y{background:#ffbd2e;}.dot.g{background:#27c93f;}
.login-inner{padding:28px 26px 24px;display:flex;flex-direction:column;gap:18px;align-items:center;}
.login-logo{font-family:'Bebas Neue',cursive;font-size:46px;letter-spacing:5px;color:#FFD600;text-shadow:3px 3px 0 #000;line-height:1;}
.login-sub{font-size:14px;color:#555;letter-spacing:3px;text-transform:uppercase;margin-top:-10px;text-align:center;}
.login-divider{width:100%;border:none;border-top:1px solid #2a2a2a;}
.google-signin-btn{display:flex;align-items:center;gap:12px;width:100%;background:#fff;border:none;padding:10px 18px;cursor:pointer;font-family:'DM Sans','Segoe UI',sans-serif;font-size:14px;font-weight:500;color:#333;justify-content:center;transition:background 0.15s;}
.google-signin-btn:hover{background:#f0f0f0;}
.login-or{display:flex;align-items:center;gap:10px;width:100%;font-size:12px;color:#333;letter-spacing:2px;}
.login-or::before,.login-or::after{content:'';flex:1;height:1px;background:#2a2a2a;}
.guest-btn{width:100%;background:#1a1a1a;border-top:1px solid #444;border-left:1px solid #444;border-right:1px solid #111;border-bottom:1px solid #111;color:#999;font-family:'VT323',monospace;font-size:20px;letter-spacing:2px;padding:8px;cursor:pointer;transition:all 0.15s;text-align:center;}
.guest-btn:hover{background:#222;color:#FFD600;border-color:#666;}
.guest-note{font-size:13px;color:#444;letter-spacing:1px;text-align:center;line-height:1.5;}
.guest-name-preview{color:#777;font-size:16px;}

#transition{position:fixed;inset:0;z-index:9997;background:#000;opacity:0;pointer-events:none;transition:opacity 0.5s ease;}
#transition.fade-out{opacity:1;pointer-events:all;}

/* Mobile-only elements — hidden on desktop */
#chat-fab{display:none;}
#chat-close-btn{display:none;}

@media(max-width:599px){
  /* Full-screen panning lobby */
  html,body{height:100%;overflow:hidden;}

  /* Panning viewport — clips the wider pan layer */
  #room-wrap{position:fixed;inset:0;z-index:5;overflow:hidden;}

  /* Pan layer — width set by JS to match image aspect */
  #room-pan{position:absolute;top:0;left:0;height:100%;will-change:transform;user-select:none;}

  /* Room image fills pan layer */
  #room{position:absolute;inset:0;background-size:cover;background-position:left center;}

  /* Hotspots: absolute within pan layer, same % as image */
  #tv-hotspot,#computer-hotspot{
    position:absolute;clip-path:none;
    border:1px solid rgba(106,163,255,0.28);
    display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px;
  }
  #tv-hotspot{left:1.9%;top:7.5%;width:14%;height:29%;}
  #computer-hotspot{left:23%;top:66%;width:15.5%;height:20%;}
  #tv-hotspot::after,#computer-hotspot::after{
    content:attr(data-label);
    position:static;background:none;
    color:rgba(255,255,255,0.55);
    font-family:'VT323',monospace;font-size:9px;letter-spacing:1px;
    text-shadow:0 1px 4px rgba(0,0,0,1);
  }
  .hint{display:none;}
  #site-title{display:none;}
  #enter-hint{display:none;}

  /* Chat: slides up from bottom */
  #lobby-chat{
    display:flex;
    position:fixed;left:0;right:0;bottom:0;
    height:70vh;z-index:200;
    background:rgba(5,5,8,0.97);
    border-top:1px solid rgba(255,255,255,0.1);
    transform:translateY(100%);
    transition:transform 0.28s ease;
  }
  #lobby-chat.chat-open{transform:translateY(0);}

  /* Close button inside chat header */
  #chat-close-btn{
    display:block;margin-left:auto;
    background:transparent;border:none;
    color:#555;font-size:18px;cursor:pointer;padding:0 2px;line-height:1;
  }

  /* CHAT button — bottom right */
  #chat-fab{
    display:flex;align-items:center;gap:6px;
    position:fixed;right:16px;bottom:16px;z-index:210;
    background:rgba(0,0,0,0.82);border:1px solid rgba(255,255,255,0.18);
    color:#ccc;font-family:'VT323',monospace;font-size:17px;
    letter-spacing:2px;padding:7px 14px;cursor:pointer;
  }

  /* Login button — bottom left, keep compact */
  #lobby-login-btn{position:fixed;left:16px;bottom:16px;z-index:210;font-size:15px;padding:7px 14px;}
}

/* lobby-chat-overlay */
#lobby-chat{position:fixed;right:10px;top:10px;width:33.333%;height:calc(100% - 20px);z-index:100;display:flex;flex-direction:column;background:transparent;border-left:1px solid rgba(255,255,255,0.07);font-family:VT323,monospace;}
#lobby-chat-title{display:flex;align-items:center;gap:6px;padding:8px 12px;background:transparent;border-bottom:1px solid rgba(255,255,255,0.08);font-size:16px;color:#ddd;letter-spacing:2px;flex-shrink:0;}
.lobby-live-dot{width:7px;height:7px;background:#FF3A3A;border-radius:50%;box-shadow:0 0 5px #FF3A3A;animation:lbpulse 1.2s steps(2) infinite;flex-shrink:0;}
@keyframes lbpulse{0%,100%{opacity:1}50%{opacity:0.3}}
#lobby-chat-messages{flex:1;overflow-y:auto;padding:6px 8px;display:flex;flex-direction:column;gap:2px;}
#lobby-chat-messages::-webkit-scrollbar{width:4px;}
#lobby-chat-messages::-webkit-scrollbar-track{background:transparent;}
#lobby-chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.18);}
.lb-chat-msg{font-size:14px;line-height:1.3;word-break:break-word;}
.lb-chat-msg-name{font-size:15px;font-weight:700;margin-right:3px;}
.lb-chat-msg-text{color:#ccc;}
#lobby-chat-input-area{padding:8px;border-top:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;gap:4px;background:transparent;flex-shrink:0;}
#lobby-name-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.13);color:#ddd;font-family:VT323,monospace;font-size:14px;padding:3px 7px;outline:none;}
#lobby-name-input:focus{border-color:#FFD600;}
#lobby-chat-bottom{display:flex;gap:4px;}
#lobby-msg-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.13);color:#ddd;font-family:VT323,monospace;font-size:14px;padding:4px 7px;outline:none;min-width:0;}
#lobby-msg-input:focus{border-color:#FFD600;}
#lobby-send-btn{background:#FFD600;color:#000;border:1px solid #FFD600;padding:4px 10px;font-size:15px;cursor:pointer;flex-shrink:0;font-weight:700;font-family:VT323,monospace;}
#lobby-send-btn:hover{background:#ffe033;}
@media(max-width:700px){#lobby-chat{display:none;}}
#lobby-login-btn{position:fixed;left:24px;bottom:24px;z-index:200;background:transparent;color:#FFD600;border:2px solid #FFD600;font-family:VT323,monospace;font-size:18px;letter-spacing:2px;padding:8px 20px;cursor:pointer;}
#lobby-login-btn:hover{background:#FFD600;color:#000;}
</style>
</head>
<body>
<div id="lobby-chat">
  <div id="lobby-chat-title">
    <div class="lobby-live-dot"></div>
    <span>LIVE CHAT</span>
    <button id="chat-close-btn" onclick="toggleMobileChat()">✕</button>
  </div>
  <div id="lobby-chat-messages"></div>
  <div id="lobby-chat-input-area">
    <input type="text" id="lobby-name-input" placeholder="Your name" maxlength="20">
    <div id="lobby-chat-bottom">
      <input type="text" id="lobby-msg-input" placeholder="Say something..." maxlength="200">
      <button id="lobby-send-btn" onclick="lobbyChat.send()">&#x27A4;</button>
    </div>
  </div>
</div>
<button id="lobby-login-btn" onclick="openLoginModal(true)">[ LOGIN ]</button>
<button id="chat-fab" onclick="toggleMobileChat()">
  <div class="lobby-live-dot"></div>CHAT
</button>
<div id="room-wrap">
  <div id="room-pan">
    <div id="room"></div>
    <div id="tv-hotspot" data-label="SCANNER" onclick="fadeNavigate('view.html')">
      <div class="hint">[ CLICK TO VIEW ]</div>
    </div>
    <div id="computer-hotspot" data-label="DRAW" onclick="fadeNavigate('app.html')">
      <div class="hint">[ CLICK TO ENTER ]</div>
    </div>
  </div>
</div>
<div id="transition"></div>

<div id="site-title">
  <h1 data-text="TODD'S WITNESSES">TODD'S WITNESSES</h1>
  <p>enter the lobby</p>
</div>

<div id="enter-hint">
  <span>click the screen or notepad</span>
  <div class="arrow">↑</div>
</div>

<div id="login-modal">
  <div class="login-box">
    <div class="login-titlebar">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      <span style="margin-left:4px;">todd's witnesses — access</span>
    </div>
    <div class="login-inner">
      <div class="login-logo">TODD'S<br>WITNESSES</div>
      <div class="login-sub">who are you?</div>
      <hr class="login-divider">
      <button class="google-signin-btn" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>
      <div class="login-or">or</div>
      <button class="guest-btn" onclick="enterAsGuest()">[ ENTER AS GUEST ]</button>
      <div class="guest-note">
        You'll be known as<br>
        <span class="guest-name-preview" id="guestNamePreview">guest····</span><br>
        <span style="color:#333;font-size:12px;">This name is fixed — it cannot be changed.</span>
      </div>
    </div>
  </div>
</div>

<script>
const SUPA_URL = 'https://cfaqadeoxskwhebyirok.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmYXFhZGVveHNrd2hlYnlpcm9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTYyOTMsImV4cCI6MjA4Nzc5MjI5M30.5LQTCPiNn5nfYLPZqeVevBu_rxiGVBvNd4kbbwa2d9Q';

function getGuestName() {
  try {
    let id = localStorage.getItem('todd_guest_id');
    if (!id) {
      const fp = [navigator.userAgent.length,screen.width,screen.height,screen.colorDepth,
        new Date().getTimezoneOffset(),navigator.hardwareConcurrency||0,navigator.language.length
      ].reduce((a,b) => (a*31+b) & 0xffff, 0x4d32);
      id = String(1000 + (Math.abs(fp) % 9000));
      localStorage.setItem('todd_guest_id', id);
    }
    return 'guest' + id;
  } catch(e) { return 'guest' + Math.floor(1000+Math.random()*9000); }
}

document.getElementById('guestNamePreview').textContent = getGuestName();

function lobbyLogout() {
  localStorage.removeItem('todd_authed');
  localStorage.removeItem('todd_user_data');
  const sbKey = Object.keys(localStorage).find(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
  if (sbKey) localStorage.removeItem(sbKey);
  updateLobbyLoginBtn();
  initLobbyName();
}

function updateLobbyLoginBtn() {
  const btn = document.getElementById('lobby-login-btn');
  if (!btn) return;
  if (isAuthed()) {
    btn.textContent = '[ LOGGED IN ]';
    btn.onclick = lobbyLogout;
  } else {
    btn.textContent = '[ LOGIN ]';
    btn.onclick = function() { openLoginModal(true); };
  }
}

function isAuthed() {
  if (localStorage.getItem('todd_authed') === '1') return true;
  return Object.keys(localStorage).some(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
}

function openLoginModal(fromLobbyBtn) {
  if (fromLobbyBtn) localStorage.setItem('lobby_origin', '1');
  document.getElementById('room').classList.add('blurred');
  document.getElementById('login-modal').classList.add('show');
}

function onComputerClick() {
  if (isAuthed()) { enterApp(); return; }
  localStorage.removeItem('lobby_origin');
  openLoginModal();
}

function loginWithGoogle() {
  const base = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/');
  const dest = localStorage.getItem('lobby_origin') === '1' ? 'index.html' : 'app.html';
  window.location.href = `${SUPA_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(base + dest)}`;
}

function enterAsGuest() {
  localStorage.setItem('todd_authed', '1');
  if (localStorage.getItem('lobby_origin') === '1') {
    localStorage.removeItem('lobby_origin');
    document.getElementById('room').classList.remove('blurred');
    document.getElementById('login-modal').classList.remove('show');
    updateLobbyLoginBtn();
    initLobbyName();
    return;
  }
  enterApp();
}

function fadeNavigate(url) {
  const fade = document.getElementById('transition');
  fade.classList.add('fade-out');
  setTimeout(() => { window.location.href = url; }, 500);
}

function enterApp() {
  fadeNavigate('app.html');
}

// If Google OAuth redirected back here with a token, forward to app.html
if (window.location.hash.includes('access_token')) {
  localStorage.setItem('todd_authed', '1');
  // Parse and persist the Supabase session so app.html auto-authenticates
  try {
    const params = {};
    window.location.hash.slice(1).split('&').forEach(function(p) {
      var kv = p.split('='); params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
    });
    localStorage.setItem('sb-cfaqadeoxskwhebyirok-auth-token', JSON.stringify({
      access_token: params['access_token'],
      refresh_token: params['refresh_token'],
      expires_at: Math.floor(Date.now() / 1000) + parseInt(params['expires_in'] || '3600'),
      token_type: 'bearer'
    }));
  } catch(e) {}
  if (localStorage.getItem('lobby_origin') === '1') {
    localStorage.removeItem('lobby_origin');
    history.replaceState(null, '', window.location.pathname);
    updateLobbyLoginBtn();
    initLobbyName();
  } else {
    window.location.replace('app.html' + window.location.hash);
  }
}

updateLobbyLoginBtn();

var LB_NAME_COLORS = ["#ff7eb3","#7eb3ff","#7effb3","#ffb37e","#d07eff","#ff7e7e","#7effe0","#fff07e","#ff9f7e","#a78bfa"];
var LB_CHAT_MAX = 80;
function lbNameColor(n){var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))&0xffffffff;return LB_NAME_COLORS[Math.abs(h)%LB_NAME_COLORS.length];}
function lbEscHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function lbAppendMsg(msg){var box=document.getElementById("lobby-chat-messages");var atBot=box.scrollHeight-box.scrollTop-box.clientHeight<80;var el=document.createElement("div");el.className="lb-chat-msg";var c=lbNameColor(msg.name);el.innerHTML="<span class=lb-chat-msg-name style=color:"+c+">"+lbEscHtml(msg.name)+":</span> <span class=lb-chat-msg-text>"+lbEscHtml(msg.text)+"</span>";box.appendChild(el);while(box.children.length>LB_CHAT_MAX)box.removeChild(box.firstChild);if(atBot)box.scrollTop=box.scrollHeight;}
async function lbLoadChat(){try{var res=await fetch(SUPA_URL+"/rest/v1/chat_messages?select=id,name,text,created_at&order=created_at.asc&limit=80",{headers:{apikey:SUPA_KEY,Authorization:"Bearer "+SUPA_KEY}});var msgs=await res.json();var box=document.getElementById("lobby-chat-messages");box.innerHTML="";if(Array.isArray(msgs))msgs.forEach(lbAppendMsg);box.scrollTop=box.scrollHeight;}catch(e){}}
function lbSubscribeChat(){var wsUrl=SUPA_URL.replace("https://","wss://")+"/realtime/v1/websocket?apikey="+SUPA_KEY+"&vsn=1.0.0";var ws,ping;function connect(){ws=new WebSocket(wsUrl);ws.onopen=function(){ws.send(JSON.stringify({topic:"realtime:public:chat_messages",event:"phx_join",payload:{},ref:"lb1"}));ping=setInterval(function(){if(ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({topic:"phoenix",event:"heartbeat",payload:{},ref:"lbhb"}));},20000);};ws.onmessage=function(e){try{var m=JSON.parse(e.data);if(m.event==="INSERT"&&m.payload&&m.payload.record)lbAppendMsg(m.payload.record);}catch(err){}};ws.onclose=function(){clearInterval(ping);setTimeout(connect,3000);};ws.onerror=function(){ws.close();};}connect();}
var lobbyChat={send:async function(){var ne=document.getElementById("lobby-name-input");var me=document.getElementById("lobby-msg-input");var name=(ne.value||"").trim()||getGuestName();var text=(me.value||"").trim();if(!text)return;me.value="";try{await fetch(SUPA_URL+"/rest/v1/chat_messages",{method:"POST",headers:{apikey:SUPA_KEY,Authorization:"Bearer "+SUPA_KEY,"Content-Type":"application/json",Prefer:"return=minimal"},body:JSON.stringify({name:name,text:text})});}catch(e){}}};
document.getElementById("lobby-msg-input").addEventListener("keydown",function(e){if(e.key==="Enter")lobbyChat.send();});
lbLoadChat();lbSubscribeChat();

function lbGetStoredToken() {
  try {
    const k = Object.keys(localStorage).find(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
    if (k) { const s = JSON.parse(localStorage.getItem(k)); return s?.access_token || ''; }
  } catch(e) {}
  return '';
}

function lbSetNameField(value, isUser) {
  const el = document.getElementById('lobby-name-input');
  if (!el) return;
  el.value = value;
  el.readOnly = isUser;
  el.style.color = isUser ? '#00cc66' : '#aaa';
  el.style.borderColor = isUser ? '#00cc66' : '';
  el.title = isUser ? value : '';
}

async function initLobbyName() {
  // 1. Cached user data (written by app.html or a previous lobby fetch)
  try {
    const raw = localStorage.getItem('todd_user_data');
    if (raw) {
      const u = JSON.parse(raw);
      if (u && u.username) { lbSetNameField(u.username + ' ✔', true); return; }
    }
  } catch(e) {}

  // 2. Live fetch from Supabase if there is a valid token
  const token = lbGetStoredToken();
  if (token) {
    try {
      const uRes = await fetch(SUPA_URL + '/auth/v1/user', {
        headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + token }
      });
      if (uRes.ok) {
        const user = await uRes.json();
        if (user && user.id) {
          const rRes = await fetch(
            SUPA_URL + '/rest/v1/usernames?user_id=eq.' + encodeURIComponent(user.id) + '&select=username&limit=1',
            { headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + token } }
          );
          if (rRes.ok) {
            const rows = await rRes.json();
            const username = rows[0] && rows[0].username;
            if (username) {
              try { localStorage.setItem('todd_user_data', JSON.stringify({ username, userId: user.id, email: user.email, verified: true })); } catch(e) {}
              lbSetNameField(username + ' ✔', true);
              return;
            }
          }
        }
      }
    } catch(e) {}
  }

  // 3. Fall back to fingerprint guest name
  lbSetNameField(getGuestName(), false);
}

initLobbyName();
