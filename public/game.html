<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WRIST GAME 3000</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
:root { --accent:#FFD600; --green:#00cc66; --red:#FF3A3A; }
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#060608; color:#e0e0e0; font-family:'VT323',monospace; overflow:hidden; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:9000;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.05) 3px,rgba(0,0,0,0.05) 6px); }

/* ── Layout ── */
#app { display:flex; height:100vh; }
#main { flex:1; display:flex; flex-direction:column; min-width:0; }
#sidebar { width:270px; flex-shrink:0; border-left:1px solid rgba(255,255,255,0.1); display:flex; flex-direction:column; }

/* ── Top bar ── */
#topbar { display:flex; align-items:center; gap:14px; padding:8px 14px; border-bottom:1px solid rgba(255,255,255,0.08); flex-shrink:0; }
#back-btn { background:#c0c0c0; border-top:2px solid #dfdfdf; border-left:2px solid #dfdfdf; border-right:2px solid #808080; border-bottom:2px solid #808080; color:#000; font-family:'VT323',monospace; font-size:17px; letter-spacing:2px; padding:3px 10px; cursor:pointer; text-decoration:none; flex-shrink:0; }
#back-btn:hover { border-top:2px solid #808080; border-left:2px solid #808080; border-right:2px solid #dfdfdf; border-bottom:2px solid #dfdfdf; }
#game-title { font-size:26px; letter-spacing:4px; color:var(--accent); flex:1; }
#stat-pts span { color:var(--accent); }

/* ── Sub-stats ── */
#substats { display:flex; gap:20px; padding:5px 14px; border-bottom:1px solid rgba(255,255,255,0.06); flex-shrink:0; font-size:15px; color:#555; letter-spacing:1px; }
#substats b { color:#888; }

/* ── Scene ── */
#scene-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  cursor:pointer; user-select:none; -webkit-user-select:none; position:relative; }
#scene-wrap.cooldown { cursor:not-allowed; }
#scene-wrap:not(.cooldown):active #scene { filter:brightness(1.15); }
#scene-wrap.cooldown #scene { filter:brightness(0.45) saturate(0.3); }
#scene { position:relative; width:260px; height:340px; }

#char-img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain;
  display:flex; align-items:center; justify-content:center; }
#char-img img { width:100%; height:100%; object-fit:contain; }
.char-placeholder { font-size:120px; line-height:1; filter:grayscale(1) opacity(0.2); pointer-events:none; }

#hand { position:absolute; bottom:80px; left:50%; transform:translateX(-50%); pointer-events:none; }
#hand img { width:70px; height:auto; display:block; }
.hand-placeholder { font-size:56px; line-height:1; display:block; }

#hand.passive-on  { animation: stroke var(--hand-spd,6s) ease-in-out infinite; }
#hand.click-burst { animation: stroke 0.22s ease-in-out 1 !important; }
@keyframes stroke {
  0%   { transform:translateX(-50%) translateY(0px); }
  38%  { transform:translateX(-50%) translateY(-34px); }
  72%  { transform:translateX(-50%) translateY(8px); }
  100% { transform:translateX(-50%) translateY(0px); }
}

/* ── Equipment box ── */
#equip-box { position:absolute; bottom:14px; left:14px; pointer-events:none;
  border:1px solid rgba(255,255,255,0.12); padding:7px 12px; background:rgba(0,0,0,0.55); }
#equip-label { font-size:12px; color:#444; letter-spacing:3px; }
#val-equip { font-size:19px; color:#e0e0e0; letter-spacing:2px; display:block; margin-top:1px; }

/* ── Effects box ── */
#effects-box { position:absolute; bottom:14px; right:14px; pointer-events:none;
  border:1px solid rgba(255,255,255,0.12); padding:7px 12px; background:rgba(0,0,0,0.55);
  min-width:120px; display:none; }
#effects-box.visible { display:block; }
#effects-label { font-size:12px; color:#444; letter-spacing:3px; }
#effects-list { margin-top:3px; display:flex; flex-direction:column; gap:2px; }
.effect-entry { font-size:14px; letter-spacing:1px; }
.effect-debuff { color:var(--red); }
.effect-buff   { color:var(--green); }

#click-hint { font-size:16px; color:#333; letter-spacing:3px; pointer-events:none; }
#scene-wrap.cooldown #click-hint { color:var(--red); }

/* ── Stamina bar ── */
#stamina-section { padding:10px 18px 14px; flex-shrink:0; border-top:1px solid rgba(255,255,255,0.06); }
#stamina-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
#stamina-title { font-size:14px; letter-spacing:3px; color:#555; }
#stamina-status { font-size:15px; letter-spacing:1px; color:#555; }
#stamina-track { height:16px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); position:relative; overflow:hidden; }
#stamina-fill { height:100%; width:100%; background:var(--green); transition:width 0.12s linear, background 0.4s; }
#stamina-fill.low      { background:#ffaa00; }
#stamina-fill.critical { background:var(--red); }
#stamina-fill.empty    { background:rgba(255,58,58,0.25); animation:cdpulse 1s steps(2) infinite; }
@keyframes cdpulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
#cooldown-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:13px; letter-spacing:2px; color:var(--red); pointer-events:none; }

/* ── Floaties ── */
.floatie { position:fixed; pointer-events:none; font-size:19px; color:var(--accent);
  font-family:'VT323',monospace; animation:floatUp 0.85s ease-out forwards; z-index:9001; letter-spacing:1px; }
@keyframes floatUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-55px)} }

/* ── Sidebar ── */
#shop-header { padding:8px 12px; border-bottom:1px solid rgba(255,255,255,0.08); flex-shrink:0; }
#shop-label { font-size:13px; letter-spacing:3px; color:#444; }
#shop-tabs { display:flex; border-bottom:1px solid rgba(255,255,255,0.08); flex-shrink:0; }
.shop-tab { flex:1; background:transparent; border:none; border-bottom:2px solid transparent;
  color:#555; font-family:'VT323',monospace; font-size:14px; letter-spacing:1px;
  padding:7px 4px; cursor:pointer; text-align:center; transition:color .1s; }
.shop-tab:hover { color:#bbb; }
.shop-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

#shop-items { flex:1; overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:3px; }
#shop-items::-webkit-scrollbar { width:3px; }
#shop-items::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); }

.shop-item { padding:8px 10px; border:1px solid rgba(255,255,255,0.08); cursor:pointer; transition:border-color .1s, background .1s; }
.shop-item:hover:not(.locked) { border-color:rgba(255,214,0,0.4); background:rgba(255,214,0,0.04); }
.shop-item.locked { opacity:0.38; cursor:default; }
.si-row1 { display:flex; justify-content:space-between; align-items:baseline; gap:6px; }
.si-name { font-size:17px; color:#ddd; letter-spacing:1px; }
.si-cost { font-size:15px; color:var(--accent); white-space:nowrap; }
.si-desc { font-size:13px; color:#555; letter-spacing:1px; margin-top:1px; }
.shop-divider { font-size:12px; color:#333; letter-spacing:3px; padding:6px 4px 2px; }

#reset-btn { margin:6px; padding:5px; background:transparent; border:1px solid rgba(255,58,58,0.25);
  color:#3a1a1a; font-family:'VT323',monospace; font-size:13px; letter-spacing:2px;
  cursor:pointer; text-align:center; flex-shrink:0; transition:border-color .1s, color .1s; }
#reset-btn:hover { border-color:var(--red); color:var(--red); }

/* ── Test buttons ── */
#test-btns { display:flex; gap:4px; padding:0 6px 6px; flex-shrink:0; }
.test-btn { flex:1; background:transparent; border:1px solid rgba(255,214,0,0.2); color:#555;
  font-family:'VT323',monospace; font-size:12px; letter-spacing:1px; padding:4px;
  cursor:pointer; transition:border-color .1s, color .1s; }
.test-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── EVENT overlay ── */
#event-overlay { display:none; position:fixed; inset:0; z-index:9600;
  background:rgba(0,0,0,0.88); align-items:center; justify-content:center; }
#event-overlay.show { display:flex; }
#event-box { border:2px solid var(--accent); padding:32px 40px; text-align:center;
  background:#080700; display:flex; flex-direction:column; align-items:center; gap:18px;
  animation:sore-in .25s ease-out; max-width:480px; }
#event-msg { font-size:28px; color:var(--accent); letter-spacing:3px; line-height:1.3; }
#event-choice-btns { display:flex; gap:16px; }
.event-btn { background:transparent; font-family:'VT323',monospace; font-size:20px;
  letter-spacing:3px; padding:8px 28px; cursor:pointer; transition:border-color .1s, color .1s; }
#event-yes { border:2px solid rgba(0,204,102,0.4); color:#555; }
#event-yes:hover { border-color:var(--green); color:var(--green); }
#event-no  { border:2px solid rgba(255,58,58,0.3); color:#555; }
#event-no:hover  { border-color:var(--red); color:var(--red); }
#event-result-area { display:none; flex-direction:column; align-items:center; gap:14px; }
#event-result-msg { font-size:26px; color:#e0e0e0; letter-spacing:3px; line-height:1.3; }
#event-close { background:transparent; border:1px solid rgba(255,214,0,0.3); color:#666;
  font-family:'VT323',monospace; font-size:14px; letter-spacing:2px;
  padding:6px 20px; cursor:pointer; transition:border-color .1s, color .1s; }
#event-close:hover { border-color:var(--accent); color:var(--accent); }

/* ── SORE overlay ── */
#sore-overlay { display:none; position:fixed; inset:0; z-index:9500;
  background:rgba(0,0,0,0.88); align-items:center; justify-content:center; }
#sore-overlay.show { display:flex; }
#sore-box { border:2px solid var(--red); padding:32px 40px; text-align:center;
  background:#0a0002; display:flex; flex-direction:column; align-items:center; gap:16px;
  animation:sore-in .25s ease-out; }
@keyframes sore-in { from{transform:scale(0.88);opacity:0} to{transform:scale(1);opacity:1} }
#sore-title { font-size:52px; color:var(--red); letter-spacing:6px;
  animation:sore-flash 0.9s steps(2) infinite; }
@keyframes sore-flash { 0%,100%{opacity:1} 50%{opacity:0.5} }
#sore-timer { font-size:38px; color:#e0e0e0; letter-spacing:4px; }
#sore-regen-line { font-size:18px; color:#555; letter-spacing:2px; }
#sore-regen-line span { color:#888; }
#sore-skip { margin-top:4px; background:transparent; border:1px solid rgba(255,214,0,0.3);
  color:#666; font-family:'VT323',monospace; font-size:14px; letter-spacing:2px;
  padding:6px 16px; cursor:pointer; transition:border-color .1s, color .1s; }
#sore-skip:hover { border-color:var(--accent); color:var(--accent); }
</style>
</head>
<body>
<div id="app">

  <div id="main">
    <div id="topbar">
      <a id="back-btn" href="index.html">← BACK</a>
      <span id="game-title">WRIST GAME 3000</span>
      <div id="stat-pts">POINTS: <span id="val-pts">0</span></div>
    </div>
    <div id="substats">
      <span><b>PER CLICK:</b> <span id="val-cpc">1</span></span>
      <span><b>PER SEC:</b> <span id="val-pps">0.0</span></span>
      <span><b>ALL TIME:</b> <span id="val-total">0</span></span>
    </div>

    <div id="scene-wrap" onclick="handleClick(event)">
      <div id="scene">
        <!-- CHARACTER: replace with <img src="character.png"> -->
        <div id="char-img"><span class="char-placeholder">🧍</span></div>
        <!-- HAND: replace with <img src="hand.png">, adjust bottom/left -->
        <div id="hand"><span class="hand-placeholder">✋</span></div>
      </div>
      <div id="equip-box">
        <div id="equip-label">EQUIPPED</div>
        <span id="val-equip">Bare Hand</span>
      </div>
      <div id="effects-box">
        <div id="effects-label">EFFECTS</div>
        <div id="effects-list"></div>
      </div>
      <div id="click-hint">[ CLICK TO STROKE ]</div>
    </div>

    <!-- ── Stamina bar ── -->
    <div id="stamina-section">
      <div id="stamina-header">
        <span id="stamina-title">STAMINA</span>
        <span id="stamina-status">100 / 100</span>
      </div>
      <div id="stamina-track">
        <div id="stamina-fill"></div>
        <div id="cooldown-text"></div>
      </div>
    </div>
  </div>

  <div id="sidebar">
    <div id="shop-header"><div id="shop-label">UPGRADE SHOP</div></div>
    <div id="shop-tabs">
      <button class="shop-tab active" onclick="setTab('click')">CLICK</button>
      <button class="shop-tab"        onclick="setTab('passive')">PASSIVE</button>
      <button class="shop-tab"        onclick="setTab('stamina')">STAMINA</button>
    </div>
    <div id="shop-items"></div>
    <div id="test-btns">
      <button class="test-btn" onclick="skipCooldown()">SKIP CD [TEST]</button>
      <button class="test-btn" onclick="fullStamina()">FULL STAMINA [TEST]</button>
    </div>
    <div id="test-btns" style="padding-top:0">
      <button class="test-btn" onclick="showEvent(EVENTS[0])">COKE [TEST]</button>
      <button class="test-btn" onclick="showEvent(EVENTS[1])">MOM [TEST]</button>
    </div>
    <button id="reset-btn" onclick="resetGame()">RESET PROGRESS</button>
  </div>

</div>

<!-- EVENT overlay -->
<div id="event-overlay">
  <div id="event-box">
    <div id="event-msg"></div>
    <div id="event-choice-btns">
      <button class="event-btn" id="event-yes" onclick="eventChoose('yes')">[ YES ]</button>
      <button class="event-btn" id="event-no"  onclick="eventChoose('no')">[ NO ]</button>
    </div>
    <div id="event-result-area">
      <div id="event-result-msg"></div>
      <button id="event-close" onclick="dismissEvent()">[ OK ]</button>
    </div>
  </div>
</div>

<!-- SORE overlay -->
<div id="sore-overlay">
  <div id="sore-box">
    <div id="sore-title">FUCK I GOT SORE</div>
    <div id="sore-subtitle" style="font-size:22px;color:#888;letter-spacing:3px;margin-top:-8px;"></div>
    <div id="sore-timer">15:00</div>
    <div id="sore-regen-line">STAMINA: <span id="sore-stam">0</span> / <span id="sore-stam-max">100</span></div>
    <button id="sore-skip" onclick="dismissSoreOverlay()">[ OK, I GOT IT ]</button>
    <button id="sore-test-skip" onclick="skipCooldown()" style="background:transparent;border:1px solid rgba(255,214,0,0.15);color:#333;font-family:'VT323',monospace;font-size:12px;letter-spacing:2px;padding:4px 12px;cursor:pointer;">SKIP CD [TEST]</button>
  </div>
</div>
<script>
// ─────────────────────────────────────────────
//  Game state
// ─────────────────────────────────────────────
let pts      = 0;
let totalPts = 0;
let cpc      = 1;    // points per click
let pps      = 0;    // passive points per second
let spdMult  = 1;    // multiplier on pps
let frac     = 0;    // fractional accumulator

// Stamina
// Formula: every 1 point earned costs STAMINA_PER_POINT stamina.
// Default: 100 pts = 10 stamina  →  STAMINA_PER_POINT = 0.1
// Energy drinks reduce this multiplier; tiers increase maxStamina.
let maxStamina      = 100;
let stamina         = 100;
let staminaPerPoint = 0.1;  // stamina cost per point earned (click or passive)
let cooldownDur     = 1800; // 30 minutes in seconds
let onCooldown      = false;
let cooldownLeft    = 0;
let cooldownType    = 'sore'; // 'sore' | 'rift'
const STAMINA_REGEN = 100 / 3600; // 100 stamina per hour = ~0.0278/sec
const RIFT_CD       = 300;  // 5 minutes in seconds
const RIFT_CHANCE   = 0.03; // 3% per click
const COKE_CD       = 7200; // 2 hours in seconds
const EVENT_CHANCE  = 0.02; // 2% per click

let lastTs      = null;
let activeTab   = 'click';
let _clickBurst = false;
let activeEvent     = null;
let _postDismissFn  = null;
let cokeCount       = 0;     // times coke was accepted
let cokeDeclined    = false; // declined once → never offered again
let pillGiven       = false; // pill was offered (accepted or not) → coke gone
let momDebuffUntil  = 0;     // timestamp (ms) when mom debuff expires; 0 = inactive
let lastEffectsTs   = 0;

function pointMult() {
  return (momDebuffUntil > 0 && Date.now() < momDebuffUntil) ? 0.8 : 1;
}

// ─────────────────────────────────────────────
//  Upgrades
// ─────────────────────────────────────────────
const UPS = [
  // ── CLICK ──
  { id:'c1', cat:'click',   name:'Chapstick',       desc:'+1 per click',         fn:()=>cpc+=1,               base:10    },
  { id:'c2', cat:'click',   name:'Premium Lotion',  desc:'+3 per click',         fn:()=>cpc+=3,               base:80    },
  { id:'c3', cat:'click',   name:'Ergonomic Grip',  desc:'+10 per click',        fn:()=>cpc+=10,              base:550   },
  { id:'c4', cat:'click',   name:'Robo-Hand 3000',  desc:'+50 per click',        fn:()=>cpc+=50,              base:4500  },
  { id:'c5', cat:'click',   name:'Quantum Knuckle', desc:'+250 per click',       fn:()=>cpc+=250,             base:40000 },

  // ── PASSIVE — income ──
  { id:'p1', cat:'passive', name:'Autopilot Mode',  desc:'+0.5/sec',   fn:()=>pps+=0.5,    base:20    },
  { id:'p3', cat:'passive', name:'Wrist Training',  desc:'+2/sec',     fn:()=>pps+=2,      base:150   },
  { id:'p5', cat:'passive', name:'Gym Membership',  desc:'+10/sec',    fn:()=>pps+=10,     base:1000  },
  { id:'p7', cat:'passive', name:'Neural Override', desc:'+50/sec',    fn:()=>pps+=50,     base:8000  },
  { id:'p9', cat:'passive', name:'Astral Arm',      desc:'+250/sec',   fn:()=>pps+=250,    base:70000 },
  // ── PASSIVE — speed ──
  { id:'p2', cat:'passive', name:'2× Speed',        desc:'Doubles payout per tick',   fn:()=>spdMult*=2,   base:60    },
  { id:'p4', cat:'passive', name:'3× Speed',        desc:'Triples payout per tick',   fn:()=>spdMult*=3,   base:400   },
  { id:'p6', cat:'passive', name:'5× Speed',        desc:'5× payout per tick',        fn:()=>spdMult*=5,   base:3500  },
  { id:'p8', cat:'passive', name:'10× Speed',       desc:'10× payout per tick',       fn:()=>spdMult*=10,  base:35000 },

  // ── STAMINA — tiers ──
  { id:'st2', cat:'stamina', name:'Level 2',         desc:'Max stamina +50',    fn:()=>maxStamina+=50,                              base:30   },
  { id:'st3', cat:'stamina', name:'Level 3',         desc:'Max stamina +100',   fn:()=>maxStamina+=100,                             base:180  },
  { id:'st4', cat:'stamina', name:'Level 4',         desc:'Max stamina +200',   fn:()=>maxStamina+=200,                             base:1000 },
  { id:'st5', cat:'stamina', name:'Level 5',         desc:'Max stamina +500',   fn:()=>maxStamina+=500,                             base:6000 },
  // ── STAMINA — energy drinks (reduce stamina cost per point) ──
  { id:'ed1', cat:'stamina', name:'Energy Drink',    desc:'−25% stamina cost per point',  fn:()=>staminaPerPoint=Math.max(0.01,staminaPerPoint*0.75),  base:50   },
  { id:'ed2', cat:'stamina', name:'Monster',         desc:'−35% stamina cost per point',  fn:()=>staminaPerPoint=Math.max(0.01,staminaPerPoint*0.65),  base:300  },
  { id:'ed3', cat:'stamina', name:'Red Bull',        desc:'−50% stamina cost per point',  fn:()=>staminaPerPoint=Math.max(0.01,staminaPerPoint*0.50),  base:2000 },
  // ── STAMINA — viagra ──
  { id:'vi1', cat:'stamina', name:'Viagra',          desc:'-2s cooldown',       fn:()=>cooldownDur=Math.max(2,cooldownDur-2),        base:70   },
  { id:'vi2', cat:'stamina', name:'Cialis',          desc:'-3s cooldown',       fn:()=>cooldownDur=Math.max(2,cooldownDur-3),        base:450  },
  { id:'vi3', cat:'stamina', name:'The Blue Pill+',  desc:'-3s cooldown',       fn:()=>cooldownDur=Math.max(2,cooldownDur-3),        base:3500 },
];
UPS.forEach(u => u.count = 0);

// ─────────────────────────────────────────────
//  Random events
// ─────────────────────────────────────────────
const EVENTS = [
  {
    id:        'coke',
    minPts:    1000,
    prompt:    'YOUR BUDDY OFFERS A LINE OF COKE. SNIFF IT?',
    yesResult: "YOU'VE CONTRACTED THE COKE DICK SYNDROME. YOU'RE FUCKED.",
    yesFn:     () => { cokeCount++; startCooldown('coke'); },
    yesPost:   () => { if (cokeCount >= 3) showPillEvent(); save(); },
    noResult:  'VIRGIN GO WANK OFF',
    noFn:      () => { cokeDeclined = true; save(); },
    noPost:    null,
  },
  {
    id:        'mom',
    prompt:    'YOUR MOM WALKS IN ON YOU. WHAT THE FUCK.',
    yesLabel:  'COVER YOURSELF WITH A BLANKET',
    yesResult: 'YOUR MOM FEELS AWKWARD ABOUT IT AND PRETENDS NOT TO NOTICE.',
    yesFn:     null,
    yesPost:   null,
    noLabel:   'CONTINUE',
    noResult:  'YOUR MOM IS DISGUSTED AND CURSES YOU OUT.',
    noFn:      () => { momDebuffUntil = Date.now() + 24 * 60 * 60 * 1000; save(); },
    noPost:    () => showAnnouncement('WHAT AN EMBARRASSMENT.\nPOINT GAINS REDUCED BY 20%\nFOR THE NEXT 24 HOURS.'),
  },
  // event 3 — TBD
];

function rollEvent() {
  if (Math.random() >= EVENT_CHANCE) return;
  const available = EVENTS.filter(ev => {
    if (ev.minPts && totalPts < ev.minPts) return false;
    if (ev.id === 'coke' && (cokeDeclined || pillGiven)) return false;
    return true;
  });
  if (!available.length) return;
  showEvent(available[Math.floor(Math.random() * available.length)]);
}

function showPillEvent() {
  pillGiven = true;
  showEvent({
    id:        'pill',
    prompt:    'YOUR BUDDY FEELS BAD ABOUT ALL THE COKE.\nHE HANDS YOU A VITALITY PILL.',
    yesLabel:  'TAKE IT',
    yesResult: 'VITALITY PILL TAKEN. MAX STAMINA +10%.',
    yesFn:     () => { maxStamina = Math.round(maxStamina * 1.1); renderStamina(); save(); },
    yesPost:   null,
    noLabel:   'REFUSE IT',
    noResult:  'YOU DECLINE. IT IS GONE FOREVER.',
    noFn:      null,
    noPost:    null,
  });
}

function showEvent(ev) {
  activeEvent = ev;
  document.getElementById('event-msg').textContent           = ev.prompt;
  document.getElementById('event-yes').textContent           = '[ ' + (ev.yesLabel || 'YES') + ' ]';
  document.getElementById('event-no').textContent            = '[ ' + (ev.noLabel  || 'NO')  + ' ]';
  document.getElementById('event-choice-btns').style.display = '';
  document.getElementById('event-result-area').style.display = 'none';
  document.getElementById('event-overlay').classList.add('show');
}

function eventChoose(choice) {
  if (!activeEvent) return;
  const text   = choice === 'yes' ? activeEvent.yesResult : activeEvent.noResult;
  const fn     = choice === 'yes' ? activeEvent.yesFn     : activeEvent.noFn;
  const postFn = choice === 'yes' ? activeEvent.yesPost   : activeEvent.noPost;

  _postDismissFn = postFn || null;

  document.getElementById('event-choice-btns').style.display = 'none';
  document.getElementById('event-result-msg').textContent    = text;
  document.getElementById('event-result-area').style.display = 'flex';

  if (fn) fn();
  if (!fn && !postFn) setTimeout(dismissEvent, 2000); // auto-dismiss if nothing follows
}

function dismissEvent() {
  document.getElementById('event-overlay').classList.remove('show');
  activeEvent = null;
  const fn = _postDismissFn;
  _postDismissFn = null;
  if (fn) fn();
}

function showAnnouncement(msg) {
  // Shows the event overlay in result-only mode — no choice buttons
  activeEvent = { yesPost:null, noPost:null };
  _postDismissFn = null;
  document.getElementById('event-msg').textContent           = '';
  document.getElementById('event-choice-btns').style.display = 'none';
  document.getElementById('event-result-msg').textContent    = msg;
  document.getElementById('event-result-area').style.display = 'flex';
  document.getElementById('event-overlay').classList.add('show');
}

function cost(u) { return u.base; } // buy-once, cost never changes

// ─────────────────────────────────────────────
//  Save / Load
// ─────────────────────────────────────────────
const SAVE_KEY = 'wristgame_v2';

function save() {
  const d = { pts, totalPts, cpc, pps, spdMult, frac, maxStamina, stamina, staminaPerPoint, cooldownDur,
              cokeCount, cokeDeclined, pillGiven, momDebuffUntil, counts:{} };
  UPS.forEach(u => d.counts[u.id] = u.count);
  localStorage.setItem(SAVE_KEY, JSON.stringify(d));
}

function load() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    pts         = d.pts         || 0;
    totalPts    = d.totalPts    || 0;
    cpc         = d.cpc         || 1;
    pps         = d.pps         || 0;
    spdMult     = d.spdMult     || 1;
    frac        = d.frac        || 0;
    maxStamina      = d.maxStamina      || 100;
    staminaPerPoint = d.staminaPerPoint || 0.1;
    cooldownDur     = d.cooldownDur     || 10;
    if (d.counts) UPS.forEach(u => { u.count = d.counts[u.id] || 0; });
    stamina      = (d.stamina      != null)  ? d.stamina      : maxStamina;
    cokeCount      = d.cokeCount      || 0;
    cokeDeclined   = d.cokeDeclined   || false;
    pillGiven      = d.pillGiven      || false;
    momDebuffUntil = d.momDebuffUntil || 0;
  } catch(e) {}
}

function resetGame() {
  if (!confirm('Wipe all progress and start over?')) return;
  localStorage.removeItem(SAVE_KEY);
  pts=0; totalPts=0; cpc=1; pps=0; spdMult=1; frac=0;
  maxStamina=100; stamina=100; staminaPerPoint=0.1; cooldownDur=1800;
  onCooldown=false; cooldownLeft=0;
  cokeCount=0; cokeDeclined=false; pillGiven=false; momDebuffUntil=0;
  UPS.forEach(u => u.count=0);
  updatePassiveAnim();
  renderEquipment();
  renderStats();
  renderStamina();
  renderShop();
}

// ─────────────────────────────────────────────
//  Click
// ─────────────────────────────────────────────
function handleClick(e) {
  if (onCooldown || activeEvent) return;
  // Cost = points earned × staminaPerPoint
  stamina = Math.max(0, stamina - cpc * staminaPerPoint);
  const clickEarned = cpc * pointMult();
  pts      += clickEarned;
  totalPts += clickEarned;
  spawnFloatie(e.clientX, e.clientY, '+' + fmt(clickEarned));
  triggerClickBurst();
  renderStats();
  renderShop();
  renderStamina();
  save();
  if (stamina <= 0) {
    startCooldown('sore');
  } else if (Math.random() < RIFT_CHANCE) {
    startCooldown('rift');
  } else {
    rollEvent();
  }
}

// ─────────────────────────────────────────────
//  Stamina & cooldown
// ─────────────────────────────────────────────
function fmtTime(s) {
  s = Math.ceil(s);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function startCooldown(type = 'sore') {
  cooldownType = type;
  onCooldown   = true;
  cooldownLeft = type === 'rift' ? RIFT_CD : type === 'coke' ? COKE_CD : cooldownDur;
  if (type === 'sore') stamina = 0;
  handEl.classList.remove('passive-on', 'click-burst');
  _clickBurst = false;
  document.getElementById('click-hint').textContent = '[ EXHAUSTED ]';
  document.getElementById('scene-wrap').classList.add('cooldown');
  if (type !== 'coke') {
    document.getElementById('sore-overlay').classList.add('show');
    renderSoreOverlay();
  }
}

function endCooldown() {
  onCooldown   = false;
  cooldownLeft = 0;
  // Stamina does NOT restore to full — it stays at whatever it regenerated to
  document.getElementById('click-hint').textContent = '[ CLICK TO STROKE ]';
  document.getElementById('scene-wrap').classList.remove('cooldown');
  document.getElementById('sore-overlay').classList.remove('show');
  updatePassiveAnim();
  renderStamina();
}

function dismissSoreOverlay() {
  document.getElementById('sore-overlay').classList.remove('show');
}

function skipCooldown() {
  if (!onCooldown) return;
  endCooldown();
}

function fullStamina() {
  stamina = maxStamina;
  renderStamina();
  save();
}

function renderSoreOverlay() {
  document.getElementById('sore-timer').textContent = fmtTime(cooldownLeft);

  if (cooldownType === 'rift') {
    document.getElementById('sore-title').textContent    = 'SHIT I GOT A RIFT';
    document.getElementById('sore-subtitle').textContent = 'GOTTA APPLY SOME LOTION';
    document.getElementById('sore-regen-line').style.display = 'none';
  } else {
    document.getElementById('sore-title').textContent    = 'FUCK I GOT SORE';
    document.getElementById('sore-subtitle').textContent = '';
    document.getElementById('sore-regen-line').style.display = '';
    document.getElementById('sore-stam').textContent     = Math.ceil(stamina);
    document.getElementById('sore-stam-max').textContent = maxStamina;
  }
}

// ─────────────────────────────────────────────
//  Hand animation
// ─────────────────────────────────────────────
const handEl = document.getElementById('hand');

handEl.addEventListener('animationend', () => {
  if (_clickBurst) {
    _clickBurst = false;
    handEl.classList.remove('click-burst');
    updatePassiveAnim();
  }
});

function triggerClickBurst() {
  _clickBurst = true;
  handEl.classList.remove('click-burst', 'passive-on');
  void handEl.offsetWidth;
  handEl.classList.add('click-burst');
}

function updatePassiveAnim() {
  if (_clickBurst || onCooldown) return;
  const rate = pps; // animation speed based on base pps only
  handEl.classList.remove('passive-on');
  if (rate > 0) {
    const dur = Math.max(0.35, 5 / Math.sqrt(rate));
    handEl.style.setProperty('--hand-spd', dur + 's');
    void handEl.offsetWidth;
    handEl.classList.add('passive-on');
  }
}

// ─────────────────────────────────────────────
//  Main tick loop
// ─────────────────────────────────────────────
function tick(ts) {
  if (lastTs !== null) {
    const dt = Math.min((ts - lastTs) / 1000, 0.5);

    // Stamina regenerates at 100/hour always (during cooldown and after)
    if (stamina < maxStamina) {
      stamina = Math.min(maxStamina, stamina + STAMINA_REGEN * dt);
    }

    if (onCooldown) {
      cooldownLeft -= dt;
      if (cooldownLeft <= 0) endCooldown();
      else { renderStamina(); renderSoreOverlay(); }
    }

    // Passive income runs always — even during cooldown, and costs no stamina
    frac += pps * dt;
    if (frac >= 1) {
      const whole  = Math.floor(frac);
      const earned = whole * spdMult * pointMult();
      pts      += earned;
      totalPts += earned;
      frac     -= whole;
      renderStats();
      renderShop();
      if (!onCooldown) {
        const r = document.getElementById('scene').getBoundingClientRect();
        spawnFloatie(r.left + r.width / 2, r.top + r.height / 3, '+' + fmt(earned));
      }
    }
    if (!onCooldown) renderStamina();
    if (ts - lastEffectsTs > 1000) { renderEffects(); lastEffectsTs = ts; }
  }
  lastTs = ts;
  requestAnimationFrame(tick);
}

// ─────────────────────────────────────────────
//  Floatie
// ─────────────────────────────────────────────
function spawnFloatie(x, y, text) {
  const el = document.createElement('div');
  el.className = 'floatie';
  el.textContent = text;
  el.style.left = (x - 12) + 'px';
  el.style.top  = (y - 12) + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ─────────────────────────────────────────────
//  Number formatting
// ─────────────────────────────────────────────
function fmt(n) {
  n = Math.floor(n);
  if (n >= 1e12) return (n/1e12).toFixed(2)+'T';
  if (n >= 1e9)  return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6)  return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3)  return (n/1e3).toFixed(1)+'K';
  return n.toString();
}
function fmtDec(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  if (n >= 10)  return n.toFixed(1);
  return n.toFixed(2);
}

// ─────────────────────────────────────────────
//  Render
// ─────────────────────────────────────────────
function renderEffects() {
  const box  = document.getElementById('effects-box');
  const list = document.getElementById('effects-list');
  const effects = [];

  if (momDebuffUntil > 0 && Date.now() < momDebuffUntil) {
    const msLeft = momDebuffUntil - Date.now();
    const hLeft  = Math.floor(msLeft / 3600000);
    const mLeft  = Math.floor((msLeft % 3600000) / 60000);
    const timeStr = hLeft > 0 ? hLeft + 'h ' + mLeft + 'm' : mLeft + 'm';
    effects.push({ cls:'effect-debuff', text:'-20% POINTS (' + timeStr + ')' });
  }

  if (!effects.length) { box.classList.remove('visible'); return; }
  box.classList.add('visible');
  list.innerHTML = effects.map(e =>
    `<div class="effect-entry ${e.cls}">${e.text}</div>`).join('');
}

function renderEquipment() {
  const owned = UPS.filter(u => u.cat === 'click' && u.count > 0);
  const current = owned.length ? owned[owned.length - 1] : null;
  document.getElementById('val-equip').textContent = current ? current.name : 'Bare Hand';
}

function renderStats() {
  document.getElementById('val-pts').textContent   = fmt(pts);
  document.getElementById('val-cpc').textContent   = fmt(cpc);
  document.getElementById('val-pps').textContent   = fmtDec(pps * spdMult) + '/s';
  document.getElementById('val-total').textContent = fmt(totalPts);
}

function renderStamina() {
  const fill   = document.getElementById('stamina-fill');
  const status = document.getElementById('stamina-status');
  const cdText = document.getElementById('cooldown-text');

  if (onCooldown) {
    fill.style.width = '0%';
    fill.className = 'empty';
    const cdLabel = cooldownType === 'coke' ? 'COKE DICK' : cooldownType === 'rift' ? 'RIFT' : 'EXHAUSTED';
    cdText.textContent = cdLabel + ' — ' + fmtTime(cooldownLeft);
    status.textContent = 'COOLDOWN';
    status.style.color = 'var(--red)';
  } else {
    const pct = (stamina / maxStamina) * 100;
    fill.style.width = pct + '%';
    fill.className = pct > 50 ? '' : pct > 25 ? 'low' : 'critical';
    cdText.textContent = '';
    status.textContent = Math.ceil(stamina) + ' / ' + maxStamina;
    status.style.color = '#555';
  }
}

// Shop divider labels
const STAMINA_DIVIDERS = { st2:'── TIERS ──', ed1:'── ENERGY DRINKS ──', vi1:'── VIAGRA ──' };
const PASSIVE_DIVIDERS = { p2:'── SPEED ──' };

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.shop-tab').forEach((t, i) =>
    t.classList.toggle('active', ['click','passive','stamina'][i] === tab));
  renderShop();
}

function renderShop() {
  const list = document.getElementById('shop-items');
  list.innerHTML = '';
  UPS.filter(u => u.cat === activeTab).forEach(u => {
    // Section dividers
    const dividerLabel =
      (activeTab === 'stamina' && STAMINA_DIVIDERS[u.id]) ||
      (activeTab === 'passive' && PASSIVE_DIVIDERS[u.id]);
    if (dividerLabel) {
      const div = document.createElement('div');
      div.className = 'shop-divider';
      div.textContent = dividerLabel;
      list.appendChild(div);
    }
    const owned  = u.count >= 1;
    const c      = cost(u);
    const canBuy = !owned && pts >= c;
    const div = document.createElement('div');
    div.className = 'shop-item' + (owned || !canBuy ? ' locked' : '');
    div.innerHTML =
      `<div class="si-row1">` +
      `<span class="si-name">${u.name}</span>` +
      (owned ? `<span class="si-cost" style="color:var(--green)">OWNED</span>` : `<span class="si-cost">${fmt(c)} pts</span>`) +
      `</div>` +
      `<div class="si-desc">${u.desc}</div>`;
    if (canBuy) div.addEventListener('click', () => buy(u.id));
    list.appendChild(div);
  });
}

function buy(id) {
  const u = UPS.find(x => x.id === id);
  if (!u || u.count >= 1) return;
  const c = cost(u);
  if (pts < c) return;
  pts -= c;
  u.fn();
  u.count++;
  updatePassiveAnim();
  renderEquipment();
  renderStats();
  renderStamina();
  renderShop();
  save();
}

setInterval(save, 15000);

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
load();
updatePassiveAnim();
renderEquipment();
renderEffects();
renderStats();
renderStamina();
renderShop();
requestAnimationFrame(tick);
</script>
</body>
</html>
