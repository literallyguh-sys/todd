<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WRIST GAME 3000</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
:root { --accent:#FFD600; --green:#00cc66; --red:#FF3A3A; }
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#060608; color:#e0e0e0; font-family:'VT323',monospace; overflow:hidden; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:9000;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.05) 3px,rgba(0,0,0,0.05) 6px); }

/* ── Layout ── */
#app { display:flex; height:100vh; }
#main { flex:1; display:flex; flex-direction:column; min-width:0; }
#sidebar { width:270px; flex-shrink:0; border-left:1px solid rgba(255,255,255,0.1); display:flex; flex-direction:column; }

/* ── Top bar ── */
#topbar { display:flex; align-items:center; gap:14px; padding:8px 14px; border-bottom:1px solid rgba(255,255,255,0.08); flex-shrink:0; }
#back-btn { background:#c0c0c0; border-top:2px solid #dfdfdf; border-left:2px solid #dfdfdf; border-right:2px solid #808080; border-bottom:2px solid #808080; color:#000; font-family:'VT323',monospace; font-size:17px; letter-spacing:2px; padding:3px 10px; cursor:pointer; text-decoration:none; flex-shrink:0; }
#back-btn:hover { border-top:2px solid #808080; border-left:2px solid #808080; border-right:2px solid #dfdfdf; border-bottom:2px solid #dfdfdf; }
#game-title { font-size:26px; letter-spacing:4px; color:var(--accent); flex:1; }
#stat-pts span { color:var(--accent); }

/* ── Sub-stats ── */
#substats { display:flex; gap:20px; padding:5px 14px; border-bottom:1px solid rgba(255,255,255,0.06); flex-shrink:0; font-size:15px; color:#555; letter-spacing:1px; }
#substats b { color:#888; }

/* ── Scene ── */
#scene-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  cursor:pointer; user-select:none; -webkit-user-select:none; position:relative; }
#scene-wrap.cooldown { cursor:not-allowed; }
#scene-wrap:not(.cooldown):active #scene { filter:brightness(1.15); }
#scene-wrap.cooldown #scene { filter:brightness(0.45) saturate(0.3); }
#scene { position:relative; width:260px; height:340px; }

#char-img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain;
  display:flex; align-items:center; justify-content:center; }
#char-img img { width:100%; height:100%; object-fit:contain; }
.char-placeholder { font-size:120px; line-height:1; filter:grayscale(1) opacity(0.2); pointer-events:none; }

#hand { position:absolute; bottom:80px; left:50%; transform:translateX(-50%); pointer-events:none; }
#hand img { width:70px; height:auto; display:block; }
.hand-placeholder { font-size:56px; line-height:1; display:block; }

#hand.passive-on  { animation: stroke var(--hand-spd,6s) ease-in-out infinite; }
#hand.click-burst { animation: stroke 0.22s ease-in-out 1 !important; }
@keyframes stroke {
  0%   { transform:translateX(-50%) translateY(0px); }
  38%  { transform:translateX(-50%) translateY(-34px); }
  72%  { transform:translateX(-50%) translateY(8px); }
  100% { transform:translateX(-50%) translateY(0px); }
}

/* ── Equipment panel ── */
#equip-panel { position:absolute; bottom:14px; left:14px; pointer-events:auto;
  border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.55); }
.equip-slot { padding:5px 10px; cursor:pointer; display:flex; align-items:baseline; gap:8px;
  border-bottom:1px solid rgba(255,255,255,0.05); transition:background .1s; }
.equip-slot:last-child { border-bottom:none; }
.equip-slot:hover { background:rgba(255,255,255,0.04); }
.equip-slot-label { font-size:10px; color:#444; letter-spacing:2px; width:52px; flex-shrink:0; }
.equip-slot-val { font-size:15px; color:#e0e0e0; letter-spacing:1px; }

/* ── Gear select overlay ── */
#gear-select-overlay { display:none; position:fixed; inset:0; z-index:9400;
  background:rgba(0,0,0,0.8); align-items:center; justify-content:center; }
#gear-select-overlay.show { display:flex; }
#gear-select-box { border:1px solid rgba(255,255,255,0.15); padding:20px 24px; background:#060608;
  min-width:280px; max-width:360px; display:flex; flex-direction:column; gap:10px; animation:sore-in .2s ease-out; }
#gear-select-title { font-size:15px; color:#666; letter-spacing:3px; }
.gear-sel-item { padding:8px 10px; border:1px solid rgba(255,255,255,0.08); cursor:pointer;
  display:flex; justify-content:space-between; align-items:baseline; gap:8px; transition:border-color .1s, background .1s; }
.gear-sel-item:hover:not(.selected) { border-color:rgba(255,214,0,0.3); background:rgba(255,214,0,0.04); }
.gear-sel-item.selected { border-color:rgba(0,204,102,0.4); background:rgba(0,204,102,0.04); cursor:default; }
.gear-sel-name { font-size:17px; color:#ddd; letter-spacing:1px; }
.gear-sel-item.selected .gear-sel-name { color:var(--green); }
.gear-sel-desc { font-size:12px; color:#444; letter-spacing:1px; }
#gear-select-close { background:transparent; border:1px solid rgba(255,255,255,0.1); color:#555;
  font-family:'VT323',monospace; font-size:13px; letter-spacing:2px; padding:5px;
  cursor:pointer; transition:border-color .1s, color .1s; margin-top:4px; }
#gear-select-close:hover { border-color:var(--accent); color:var(--accent); }

/* ── Gear shop buttons ── */
.gear-btn { background:transparent; font-family:'VT323',monospace; font-size:12px;
  letter-spacing:1px; padding:2px 7px; cursor:pointer; border:1px solid rgba(255,255,255,0.12);
  color:#555; transition:border-color .1s, color .1s; }
.gear-equip-btn:hover  { border-color:var(--green);  color:var(--green); }
.gear-sell-btn:hover   { border-color:var(--accent);  color:var(--accent); }
.shop-item.gear-active { border-color:rgba(0,204,102,0.25); background:rgba(0,204,102,0.03); }

/* ── Effects box ── */
#effects-box { position:absolute; bottom:14px; right:14px; pointer-events:none;
  border:1px solid rgba(255,255,255,0.12); padding:7px 12px; background:rgba(0,0,0,0.55);
  min-width:120px; display:none; }
#effects-box.visible { display:block; }
#effects-label { font-size:12px; color:#444; letter-spacing:3px; }
#effects-list { margin-top:3px; display:flex; flex-direction:column; gap:2px; }
.effect-entry { font-size:14px; letter-spacing:1px; }
.effect-debuff { color:var(--red); }
.effect-buff   { color:var(--green); }

#click-hint { font-size:16px; color:#333; letter-spacing:3px; pointer-events:none; }
#scene-wrap.cooldown #click-hint { color:var(--red); }

/* ── Stamina bar ── */
#stamina-section { padding:10px 18px 14px; flex-shrink:0; border-top:1px solid rgba(255,255,255,0.06); }
#stamina-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
#stamina-title { font-size:14px; letter-spacing:3px; color:#555; }
#stamina-status { font-size:15px; letter-spacing:1px; color:#555; }
#stamina-track { height:16px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); position:relative; overflow:hidden; }
#stamina-fill { height:100%; width:100%; background:var(--green); transition:width 0.12s linear, background 0.4s; }
#stamina-fill.low      { background:#ffaa00; }
#stamina-fill.critical { background:var(--red); }
#stamina-fill.empty    { background:rgba(255,58,58,0.25); animation:cdpulse 1s steps(2) infinite; }
@keyframes cdpulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
#cooldown-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:13px; letter-spacing:2px; color:var(--red); pointer-events:none; }

/* ── Floaties ── */
.floatie { position:fixed; pointer-events:none; font-size:19px; color:var(--accent);
  font-family:'VT323',monospace; animation:floatUp 0.85s ease-out forwards; z-index:9001; letter-spacing:1px; }
@keyframes floatUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-55px)} }

/* ── Sidebar ── */
#shop-header { padding:8px 12px; border-bottom:1px solid rgba(255,255,255,0.08); flex-shrink:0; }
#shop-label { font-size:13px; letter-spacing:3px; color:#444; }
#shop-tabs { display:flex; flex-wrap:wrap; border-bottom:1px solid rgba(255,255,255,0.08); flex-shrink:0; }
.shop-tab { flex:1; min-width:33%; background:transparent; border:none; border-bottom:2px solid transparent;
  color:#555; font-family:'VT323',monospace; font-size:13px; letter-spacing:1px;
  padding:6px 2px; cursor:pointer; text-align:center; transition:color .1s; }
.shop-tab:hover { color:#bbb; }
.shop-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.shop-tab-divider { width:100%; height:1px; background:rgba(255,255,255,0.05); flex-basis:100%; }

#shop-items { flex:1; overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:3px; }
#shop-items::-webkit-scrollbar { width:3px; }
#shop-items::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); }

.shop-item { padding:8px 10px; border:1px solid rgba(255,255,255,0.08); cursor:pointer; transition:border-color .1s, background .1s; }
.shop-item:hover:not(.locked) { border-color:rgba(255,214,0,0.4); background:rgba(255,214,0,0.04); }
.shop-item.locked { opacity:0.38; cursor:default; }
.si-row1 { display:flex; justify-content:space-between; align-items:baseline; gap:6px; }
.si-name { font-size:17px; color:#ddd; letter-spacing:1px; }
.si-cost { font-size:15px; color:var(--accent); white-space:nowrap; }
.si-desc { font-size:13px; color:#555; letter-spacing:1px; margin-top:1px; }
.shop-divider { font-size:12px; color:#333; letter-spacing:3px; padding:6px 4px 2px; }

#reset-btn { margin:6px; padding:5px; background:transparent; border:1px solid rgba(255,58,58,0.25);
  color:#3a1a1a; font-family:'VT323',monospace; font-size:13px; letter-spacing:2px;
  cursor:pointer; text-align:center; flex-shrink:0; transition:border-color .1s, color .1s; }
#reset-btn:hover { border-color:var(--red); color:var(--red); }

/* ── Test buttons ── */
#test-btns { display:flex; gap:4px; padding:0 6px 6px; flex-shrink:0; }
.test-btn { flex:1; background:transparent; border:1px solid rgba(255,214,0,0.2); color:#555;
  font-family:'VT323',monospace; font-size:12px; letter-spacing:1px; padding:4px;
  cursor:pointer; transition:border-color .1s, color .1s; }
.test-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── EVENT overlay ── */
#event-overlay { display:none; position:fixed; inset:0; z-index:9600;
  background:rgba(0,0,0,0.88); align-items:center; justify-content:center; }
#event-overlay.show { display:flex; }
#event-box { border:2px solid var(--accent); padding:32px 40px; text-align:center;
  background:#080700; display:flex; flex-direction:column; align-items:center; gap:18px;
  animation:sore-in .25s ease-out; max-width:480px; }
#event-msg { font-size:28px; color:var(--accent); letter-spacing:3px; line-height:1.3; }
#event-choice-btns { display:flex; gap:16px; }
.event-btn { background:transparent; font-family:'VT323',monospace; font-size:20px;
  letter-spacing:3px; padding:8px 28px; cursor:pointer; transition:border-color .1s, color .1s; }
#event-yes { border:2px solid rgba(0,204,102,0.4); color:#555; }
#event-yes:hover { border-color:var(--green); color:var(--green); }
#event-no  { border:2px solid rgba(255,58,58,0.3); color:#555; }
#event-no:hover  { border-color:var(--red); color:var(--red); }
#event-result-area { display:none; flex-direction:column; align-items:center; gap:14px; }
#event-result-msg { font-size:26px; color:#e0e0e0; letter-spacing:3px; line-height:1.3; }
#event-close { background:transparent; border:1px solid rgba(255,214,0,0.3); color:#666;
  font-family:'VT323',monospace; font-size:14px; letter-spacing:2px;
  padding:6px 20px; cursor:pointer; transition:border-color .1s, color .1s; }
#event-close:hover { border-color:var(--accent); color:var(--accent); }

/* ── Door hotspot ── */
#door-hotspot { position:absolute; bottom:28px; right:18px; width:52px; height:88px;
  cursor:pointer; z-index:10; }
#door-hotspot:hover::after { content:'SHOP'; position:absolute; bottom:-18px; left:50%;
  transform:translateX(-50%); font-size:11px; color:var(--accent); letter-spacing:2px;
  white-space:nowrap; opacity:0.7; }

/* ── Shop room ── */
#shop-room { display:none; position:fixed; inset:0; z-index:8000; background:#07060a;
  flex-direction:column; overflow:hidden; }
#shop-room.show { display:flex; }
#sr-header { display:flex; align-items:center; gap:14px; padding:8px 16px;
  border-bottom:1px solid rgba(255,255,255,0.08); flex-shrink:0; }
#sr-back { background:#c0c0c0; border-top:2px solid #dfdfdf; border-left:2px solid #dfdfdf;
  border-right:2px solid #808080; border-bottom:2px solid #808080; color:#000;
  font-family:'VT323',monospace; font-size:17px; letter-spacing:2px;
  padding:3px 10px; cursor:pointer; flex-shrink:0; }
#sr-back:hover { border-top:2px solid #808080; border-left:2px solid #808080;
  border-right:2px solid #dfdfdf; border-bottom:2px solid #dfdfdf; }
#sr-title { font-size:24px; letter-spacing:4px; color:var(--accent); flex:1; }
#sr-pts { font-size:17px; letter-spacing:1px; }
#sr-pts span { color:var(--accent); }
#sr-tabs { display:flex; border-bottom:1px solid rgba(255,255,255,0.08); flex-shrink:0; }
.sr-tab { flex:1; background:transparent; border:none; border-bottom:2px solid transparent;
  color:#555; font-family:'VT323',monospace; font-size:16px; letter-spacing:2px;
  padding:8px 4px; cursor:pointer; text-align:center; transition:color .1s; }
.sr-tab:hover { color:#bbb; }
.sr-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
#sr-items { flex:1; overflow-y:auto; padding:10px 20px; display:flex; flex-direction:column;
  gap:5px; max-width:700px; width:100%; align-self:center; }
#sr-items::-webkit-scrollbar { width:3px; }
#sr-items::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); }
.sr-divider { font-size:13px; color:#333; letter-spacing:3px; padding:8px 0 3px; }
.sr-item { padding:10px 14px; border:1px solid rgba(255,255,255,0.08);
  cursor:pointer; transition:border-color .1s, background .1s; }
.sr-item:hover:not(.locked) { border-color:rgba(255,214,0,0.4); background:rgba(255,214,0,0.04); }
.sr-item.locked { opacity:0.38; cursor:default; }
.sr-item.gear-active { border-color:rgba(0,204,102,0.3); background:rgba(0,204,102,0.03); }
.sr-row1 { display:flex; justify-content:space-between; align-items:center; gap:8px; }
.sr-name { font-size:20px; color:#ddd; letter-spacing:1px; }
.sr-cost { font-size:16px; color:var(--accent); white-space:nowrap; }
.sr-desc { font-size:14px; color:#555; letter-spacing:1px; margin-top:2px; }
.sr-btns { display:flex; gap:6px; align-items:center; }

/* ── SORE overlay ── */
#sore-overlay { display:none; position:fixed; inset:0; z-index:9500;
  background:rgba(0,0,0,0.88); align-items:center; justify-content:center; }
#sore-overlay.show { display:flex; }
#sore-box { border:2px solid var(--red); padding:32px 40px; text-align:center;
  background:#0a0002; display:flex; flex-direction:column; align-items:center; gap:16px;
  animation:sore-in .25s ease-out; }
@keyframes sore-in { from{transform:scale(0.88);opacity:0} to{transform:scale(1);opacity:1} }
#sore-title { font-size:52px; color:var(--red); letter-spacing:6px;
  animation:sore-flash 0.9s steps(2) infinite; }
@keyframes sore-flash { 0%,100%{opacity:1} 50%{opacity:0.5} }
#sore-timer { font-size:38px; color:#e0e0e0; letter-spacing:4px; }
#sore-regen-line { font-size:18px; color:#555; letter-spacing:2px; }
#sore-regen-line span { color:#888; }
#sore-skip { margin-top:4px; background:transparent; border:1px solid rgba(255,214,0,0.3);
  color:#666; font-family:'VT323',monospace; font-size:14px; letter-spacing:2px;
  padding:6px 16px; cursor:pointer; transition:border-color .1s, color .1s; }
#sore-skip:hover { border-color:var(--accent); color:var(--accent); }
</style>
</head>
<body>
<div id="app">

  <div id="main">
    <div id="topbar">
      <a id="back-btn" href="index.html">← BACK</a>
      <span id="game-title">WRIST GAME 3000</span>
      <div id="stat-pts">POINTS: <span id="val-pts">0</span></div>
    </div>
    <div id="substats">
      <span><b>PER CLICK:</b> <span id="val-cpc">1</span></span>
      <span><b>PER SEC:</b> <span id="val-pps">0.0</span></span>
      <span><b>ALL TIME:</b> <span id="val-total">0</span></span>
    </div>

    <div id="scene-wrap" onclick="handleClick(event)">
      <div id="scene">
        <!-- CHARACTER: replace with <img src="character.png"> -->
        <div id="char-img"><span class="char-placeholder">🧍</span></div>
        <!-- HAND: replace with <img src="hand.png">, adjust bottom/left -->
        <div id="hand"><span class="hand-placeholder">✋</span></div>
        <!-- DOOR: position/size matches drawn door in background image -->
        <div id="door-hotspot" onclick="openShopRoom(event)" title="THE SHOP"></div>
      </div>
      <div id="equip-panel">
        <div class="equip-slot" onclick="openGearSelect('tool')">
          <span class="equip-slot-label">TOOL</span>
          <span class="equip-slot-val" id="eq-tool">Bare Hand</span>
        </div>
        <div class="equip-slot" onclick="openGearSelect('lube')">
          <span class="equip-slot-label">LUBE</span>
          <span class="equip-slot-val" id="eq-lube">None</span>
        </div>
        <div class="equip-slot" onclick="openGearSelect('content')">
          <span class="equip-slot-label">CONTENT</span>
          <span class="equip-slot-val" id="eq-content">Nothing</span>
        </div>
      </div>
      <div id="effects-box">
        <div id="effects-label">EFFECTS</div>
        <div id="effects-list"></div>
      </div>
      <div id="click-hint">[ CLICK TO STROKE ]</div>
    </div>

    <!-- ── Stamina bar ── -->
    <div id="stamina-section">
      <div id="stamina-header">
        <span id="stamina-title">STAMINA</span>
        <span id="stamina-status">100 / 100</span>
      </div>
      <div id="stamina-track">
        <div id="stamina-fill"></div>
        <div id="cooldown-text"></div>
      </div>
    </div>
  </div>

  <div id="sidebar">
    <div id="shop-header"><div id="shop-label">UPGRADE SHOP</div></div>
    <div id="shop-tabs">
      <button class="shop-tab active" data-tab="click"   onclick="setTab('click')">CLICK</button>
      <button class="shop-tab"        data-tab="passive" onclick="setTab('passive')">PASSIVE</button>
      <button class="shop-tab"        data-tab="stamina" onclick="setTab('stamina')">STAMINA</button>
    </div>
    <div id="shop-items"></div>
    <div id="test-btns">
      <button class="test-btn" onclick="skipCooldown()">SKIP CD [TEST]</button>
      <button class="test-btn" onclick="fullStamina()">FULL STAMINA [TEST]</button>
    </div>
    <div id="test-btns" style="padding-top:0">
      <button class="test-btn" onclick="showEvent(EVENTS[0])">COKE [TEST]</button>
      <button class="test-btn" onclick="showEvent(EVENTS[1])">MOM [TEST]</button>
    </div>
    <div id="test-btns" style="padding-top:0">
      <button class="test-btn" onclick="showEvent(EVENTS[2])">PORN [TEST]</button>
    </div>
    <button id="reset-btn" onclick="resetGame()">RESET PROGRESS</button>
  </div>

</div>

<!-- SHOP ROOM -->
<div id="shop-room">
  <div id="sr-header">
    <button id="sr-back" onclick="closeShopRoom()">← LEAVE</button>
    <span id="sr-title">THE SHOP</span>
    <div id="sr-pts">POINTS: <span id="sr-val-pts">0</span></div>
  </div>
  <div id="sr-tabs">
    <button class="sr-tab active" data-tab="tool"    onclick="setShopTab('tool')">TOOL</button>
    <button class="sr-tab"        data-tab="lube"    onclick="setShopTab('lube')">LUBE</button>
    <button class="sr-tab"        data-tab="content" onclick="setShopTab('content')">CONTENT</button>
  </div>
  <div id="sr-items"></div>
</div>

<!-- GEAR SELECT overlay -->
<div id="gear-select-overlay">
  <div id="gear-select-box">
    <div id="gear-select-title">SELECT TOOL</div>
    <div id="gear-select-list"></div>
    <button id="gear-select-close" onclick="closeGearSelect()">[ CLOSE ]</button>
  </div>
</div>

<!-- EVENT overlay -->
<div id="event-overlay">
  <div id="event-box">
    <div id="event-msg"></div>
    <div id="event-choice-btns">
      <button class="event-btn" id="event-yes" onclick="eventChoose('yes')">YES</button>
      <button class="event-btn" id="event-no"  onclick="eventChoose('no')">NO</button>
    </div>
    <div id="event-result-area">
      <div id="event-result-msg"></div>
      <button id="event-close" onclick="dismissEvent()">[ OK ]</button>
    </div>
  </div>
</div>

<!-- SORE overlay -->
<div id="sore-overlay">
  <div id="sore-box">

    if (ev.id === 'coke' && (cokeDeclined || pillGiven)) return false;
    if (ev.id === 'porn' && pornEventDone) return false;
    return true;
  });
  if (!available.length) return;
  showEvent(available[Math.floor(Math.random() * available.length)]);
}

  document.getElementById('event-result-area').style.display = 'flex';

function dismissEvent() {

const SAVE_KEY = 'wristgame_v2';

function save() {
  const d = { pts, totalPts, cpc, pps, spdMult, frac, maxStamina, stamina, staminaPerPoint, cooldownDur,
              cokeCount, cokeDeclined, pillGiven, momDebuffUntil,
              pornEventDone, hentaiChosen, onaholeOwned,
              equippedTool, equippedLube, equippedContent,
              ownedGear: [...ownedGear], counts:{} };
  UPS.forEach(u => d.counts[u.id] = u.count);
  localStorage.setItem(SAVE_KEY, JSON.stringify(d));
}

function load() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    pts         = d.pts         || 0;
    totalPts    = d.totalPts    || 0;
    cpc         = d.cpc         || 1;
    pps         = d.pps         || 0;
    spdMult     = d.spdMult     || 1;
    frac        = d.frac        || 0;
    maxStamina      = d.maxStamina      || 100;
    staminaPerPoint = d.staminaPerPoint || 0.1;
    cooldownDur     = d.cooldownDur     || 10;
    if (d.counts) UPS.forEach(u => { u.count = d.counts[u.id] || 0; });
    stamina      = (d.stamina      != null)  ? d.stamina      : maxStamina;
    cokeCount      = d.cokeCount      || 0;
    cokeDeclined   = d.cokeDeclined   || false;
    pillGiven      = d.pillGiven      || false;
    momDebuffUntil = d.momDebuffUntil || 0;
    pornEventDone  = d.pornEventDone  || false;
    hentaiChosen   = d.hentaiChosen   || false;
    onaholeOwned   = d.onaholeOwned   || false;
    equippedTool    = d.equippedTool    || 't0';
    equippedLube    = d.equippedLube    || 'l0';
    equippedContent = d.equippedContent || 'co0';
    ownedGear       = new Set(d.ownedGear || ['t0','l0','co0']);
  } catch(e) {}
}

function resetGame() {
  if (!confirm('Wipe all progress and start over?')) return;
  localStorage.removeItem(SAVE_KEY);
  pts=0; totalPts=0; cpc=1; pps=0; spdMult=1; frac=0;
  maxStamina=100; stamina=100; staminaPerPoint=0.1; cooldownDur=1800;
  onCooldown=false; cooldownLeft=0;
  cokeCount=0; cokeDeclined=false; pillGiven=false; momDebuffUntil=0;
  pornEventDone=false; hentaiChosen=false; onaholeOwned=false;
  equippedTool='t0'; equippedLube='l0'; equippedContent='co0';
  ownedGear = new Set(['t0','l0','co0']);
  UPS.forEach(u => u.count=0);
  updatePassiveAnim();
  renderEquipPanel();
  renderStats();
  renderStamina();
  renderShop();
}

//  Click
// ─────────────────────────────────────────────
function handleClick(e) {
  if (onCooldown || activeEvent) return;
  const totalCpc = cpc + toolCpc();
  stamina = Math.max(0, stamina - totalCpc * staminaPerPoint * lubeMult());
  const clickEarned = totalCpc * pointMult();
  pts      += clickEarned;
  totalPts += clickEarned;
  spawnFloatie(e.clientX, e.clientY, '+' + fmt(clickEarned));
  triggerClickBurst();
  renderStats();
  renderShop();
  renderStamina();
  save();
  if (stamina <= 0) {
    startCooldown('sore');
  } else if (Math.random() < RIFT_CHANCE) {
    startCooldown('rift');
  } else {
    rollEvent();
  }
}

//  Stamina & cooldown
// ─────────────────────────────────────────────
function fmtTime(s) {
  s = Math.ceil(s);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function startCooldown(type = 'sore') {
  cooldownType = type;
  onCooldown   = true;
  cooldownLeft = type === 'rift' ? RIFT_CD : type === 'coke' ? COKE_CD : cooldownDur;
  if (type === 'sore') stamina = 0;
  handEl.classList.remove('passive-on', 'click-burst');
  _clickBurst = false;
  document.getElementById('click-hint').textContent = '[ EXHAUSTED ]';
  document.getElementById('scene-wrap').classList.add('cooldown');
  if (type !== 'coke') {
    document.getElementById('sore-overlay').classList.add('show');
    renderSoreOverlay();
  }
}

function endCooldown() {
  onCooldown   = false;
  cooldownLeft = 0;
  // Stamina does NOT restore to full — it stays at whatever it regenerated to
  document.getElementById('click-hint').textContent = '[ CLICK TO STROKE ]';
  document.getElementById('scene-wrap').classList.remove('cooldown');
  document.getElementById('sore-overlay').classList.remove('show');
  updatePassiveAnim();
  renderStamina();
}

function dismissSoreOverlay() {

}

function skipCooldown() {
  if (!onCooldown) return;
  endCooldown();
}

function fullStamina() {
  stamina = maxStamina;

function renderSoreOverlay() {

  if (cooldownType === 'rift') {
    document.getElementById('sore-title').textContent    = 'SHIT I GOT A RIFT';
    document.getElementById('sore-subtitle').textContent = 'GOTTA APPLY SOME LOTION';

    document.getElementById('sore-subtitle').textContent = '';
    document.getElementById('sore-regen-line').style.display = '';
    document.getElementById('sore-stam').textContent     = Math.ceil(stamina);

  }
}

const handEl = document.getElementById('hand');

handEl.addEventListener('animationend', () => {
  if (_clickBurst) {
    _clickBurst = false;
    handEl.classList.remove('click-burst');
    updatePassiveAnim();
  }
});

function triggerClickBurst() {
  _clickBurst = true;
  handEl.classList.remove('click-burst', 'passive-on');
  void handEl.offsetWidth;
  handEl.classList.add('click-burst');
}

function updatePassiveAnim() {
  if (_clickBurst || onCooldown) return;
  const rate = pps; // animation speed based on base pps only
  handEl.classList.remove('passive-on');
  if (rate > 0) {
    const dur = Math.max(0.35, 5 / Math.sqrt(rate));
    handEl.style.setProperty('--hand-spd', dur + 's');
    void handEl.offsetWidth;
    handEl.classList.add('passive-on');
  }
}

// ─────────────────────────────────────────────
//  Main tick loop
// ─────────────────────────────────────────────
function tick(ts) {
  if (lastTs !== null) {
    const dt = Math.min((ts - lastTs) / 1000, 0.5);

    // Stamina regenerates at 100/hour always (during cooldown and after)
    if (stamina < maxStamina) {
      stamina = Math.min(maxStamina, stamina + STAMINA_REGEN * dt);
    }

    if (onCooldown) {
      cooldownLeft -= dt;
      if (cooldownLeft <= 0) endCooldown();
      else { renderStamina(); renderSoreOverlay(); }
    }

    // Passive income runs always — even during cooldown, and costs no stamina
    frac += pps * dt;
    if (frac >= 1) {
      const whole  = Math.floor(frac);
      const earned = whole * spdMult * pointMult() * contentMult();
      pts      += earned;
      totalPts += earned;
      frac     -= whole;
      renderStats();
      renderShop();
      if (!onCooldown) {
        const r = document.getElementById('scene').getBoundingClientRect();
        spawnFloatie(r.left + r.width / 2, r.top + r.height / 3, '+' + fmt(earned));
      }
    }
    if (!onCooldown) renderStamina();
    if (ts - lastEffectsTs > 1000) { renderEffects(); lastEffectsTs = ts; }
  }
  lastTs = ts;
  requestAnimationFrame(tick);
}

// ─────────────────────────────────────────────
//  Floatie
// ─────────────────────────────────────────────
function spawnFloatie(x, y, text) {
  const el = document.createElement('div');
  el.className = 'floatie';
  el.textContent = text;
  el.style.left = (x - 12) + 'px';
  el.style.top  = (y - 12) + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ─────────────────────────────────────────────
//  Number formatting
// ─────────────────────────────────────────────
function fmt(n) {
  n = Math.floor(n);
  if (n >= 1e12) return (n/1e12).toFixed(2)+'T';
  if (n >= 1e9)  return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6)  return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3)  return (n/1e3).toFixed(1)+'K';
  return n.toString();
}
function fmtDec(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  if (n >= 10)  return n.toFixed(1);
  return n.toFixed(2);
}

  const list = document.getElementById('effects-list');
  const effects = [];

  if (momDebuffUntil > 0 && Date.now() < momDebuffUntil) {
    const msLeft = momDebuffUntil - Date.now();
    const hLeft  = Math.floor(msLeft / 3600000);
    const mLeft  = Math.floor((msLeft % 3600000) / 60000);
    const timeStr = hLeft > 0 ? hLeft + 'h ' + mLeft + 'm' : mLeft + 'm';
    effects.push({ cls:'effect-debuff', text:'-20% POINTS (' + timeStr + ')' });
  }

  if (!effects.length) { box.classList.remove('visible'); return; }
  box.classList.add('visible');
  list.innerHTML = effects.map(e =>
    `<div class="effect-entry ${e.cls}">${e.text}</div>`).join('');
}

function renderEquipPanel() {
  document.getElementById('eq-tool').textContent    = (GEAR.tool.find(i=>i.id===equippedTool)    || GEAR.tool[0]).name;
  document.getElementById('eq-lube').textContent    = (GEAR.lube.find(i=>i.id===equippedLube)    || GEAR.lube[0]).name;
  document.getElementById('eq-content').textContent = (GEAR.content.find(i=>i.id===equippedContent) || GEAR.content[0]).name;
}

function renderStats() {
  document.getElementById('val-pts').textContent   = fmt(pts);
  document.getElementById('val-cpc').textContent   = fmt(cpc + toolCpc());
  document.getElementById('val-pps').textContent   = fmtDec(pps * spdMult * contentMult()) + '/s';
  document.getElementById('val-total').textContent = fmt(totalPts);
  const srPts = document.getElementById('sr-val-pts');
  if (srPts) srPts.textContent = fmt(pts);
}

function renderStamina() {
  const fill   = document.getElementById('stamina-fill');
  const status = document.getElementById('stamina-status');
  const cdText = document.getElementById('cooldown-text');

  if (onCooldown) {
    fill.style.width = '0%';
    fill.className = 'empty';
    const cdLabel = cooldownType === 'coke' ? 'COKE DICK' : cooldownType === 'rift' ? 'RIFT' : 'EXHAUSTED';
    cdText.textContent = cdLabel + ' — ' + fmtTime(cooldownLeft);
    status.textContent = 'COOLDOWN';
    status.style.color = 'var(--red)';
  } else {
    const pct = (stamina / maxStamina) * 100;
    fill.style.width = pct + '%';
    fill.className = pct > 50 ? '' : pct > 25 ? 'low' : 'critical';
    cdText.textContent = '';
    status.textContent = Math.ceil(stamina) + ' / ' + maxStamina;
    status.style.color = '#555';
  }
}

// Shop divider labels
const STAMINA_DIVIDERS = { st2:'── TIERS ──', ed1:'── ENERGY DRINKS ──', vi1:'── VIAGRA ──' };
const PASSIVE_DIVIDERS = { p2:'── SPEED ──' };

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.shop-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === tab));
  renderShop();
}

function renderShop() {
  if (['tool','lube','content'].includes(activeTab)) { renderGearShop(activeTab); return; }
  const list = document.getElementById('shop-items');
  list.innerHTML = '';
  UPS.filter(u => u.cat === activeTab).forEach(u => {
    const dividerLabel =
      (activeTab === 'stamina' && STAMINA_DIVIDERS[u.id]) ||
      (activeTab === 'passive' && PASSIVE_DIVIDERS[u.id]);
    if (dividerLabel) {
      const d = document.createElement('div');
      d.className = 'shop-divider'; d.textContent = dividerLabel; list.appendChild(d);
    }
    const owned  = u.count >= 1;
    const c      = cost(u);
    const canBuy = !owned && pts >= c;
    const div = document.createElement('div');
    div.className = 'shop-item' + (owned || !canBuy ? ' locked' : '');
    div.innerHTML =
      `<div class="si-row1"><span class="si-name">${u.name}</span>` +
      (owned ? `<span class="si-cost" style="color:var(--green)">OWNED</span>` : `<span class="si-cost">${fmt(c)} pts</span>`) +
      `</div><div class="si-desc">${u.desc}</div>`;
    if (canBuy) div.addEventListener('click', () => buyUpgrade(u.id));
    list.appendChild(div);
  });
}

function renderGearShop(cat) {
  const list = document.getElementById('shop-items');
  list.innerHTML = '';
  const items     = GEAR[cat];
  const equippedId = cat==='tool' ? equippedTool : cat==='lube' ? equippedLube : equippedContent;

  const ownedItems = items.filter(i => ownedGear.has(i.id));
  if (ownedItems.length) {
    const dh = document.createElement('div'); dh.className='shop-divider'; dh.textContent='── INVENTORY ──'; list.appendChild(dh);
    ownedItems.forEach(item => {
      const isEq = item.id === equippedId;
      const div = document.createElement('div');
      div.className = 'shop-item' + (isEq ? ' gear-active' : '');
      div.innerHTML =
        `<div class="si-row1"><span class="si-name">${item.name}</span>` +
        `<div style="display:flex;gap:5px">` +
        (isEq ? `<span class="si-cost" style="color:var(--green)">EQUIPPED</span>`
               : `<button class="gear-btn gear-equip-btn" onclick="equipGear('${cat}','${item.id}')">EQUIP</button>`) +
        (!item.free ? `<button class="gear-btn gear-sell-btn" onclick="sellGear('${cat}','${item.id}')">SELL +${fmt(item.sell)}</button>` : '') +
        `</div></div><div class="si-desc">${item.desc}</div>`;
      list.appendChild(div);
    });
  }

  const shopItems = items.filter(i => !ownedGear.has(i.id) && !(i.locked && i.locked()));
  if (shopItems.length) {
    const ds = document.createElement('div'); ds.className='shop-divider'; ds.textContent='── SHOP ──'; list.appendChild(ds);
    shopItems.forEach(item => {
      const canBuy = pts >= item.cost;
      const div = document.createElement('div');
      div.className = 'shop-item' + (!canBuy ? ' locked' : '');
      div.innerHTML =
        `<div class="si-row1"><span class="si-name">${item.name}</span>` +
        `<span class="si-cost">${fmt(item.cost)} pts</span></div>` +
        `<div class="si-desc">${item.desc}</div>`;
      if (canBuy) div.addEventListener('click', () => buyGear(cat, item.id));
      list.appendChild(div);
    });
  }
}

function buyUpgrade(id) {
  const u = UPS.find(x => x.id === id);
  if (!u || u.count >= 1) return;
  const c = cost(u);
  if (pts < c) return;
  pts -= c; u.fn(); u.count++;
  updatePassiveAnim(); renderEquipPanel(); renderStats(); renderStamina(); renderShop(); save();
}

function buyGear(cat, id) {
  const item = GEAR[cat].find(i => i.id === id);
  if (!item || ownedGear.has(id) || pts < item.cost) return;
  pts -= item.cost;
  ownedGear.add(id);
  if (id === 't4') onaholeOwned = true;
  renderStats(); renderShop(); save();
}

function equipGear(cat, id) {
  if (!ownedGear.has(id)) return;
  if (cat==='tool')    equippedTool    = id;
  if (cat==='lube')    equippedLube    = id;
  if (cat==='content') equippedContent = id;
  renderEquipPanel(); renderStats(); renderShop(); save();
}

function sellGear(cat, id) {
  const item = GEAR[cat].find(i => i.id === id);
  if (!item || item.free || !ownedGear.has(id)) return;
  const freeDefault = GEAR[cat].find(i => i.free);
  if (cat==='tool'    && equippedTool    === id) { equippedTool    = freeDefault.id; }
  if (cat==='lube'    && equippedLube    === id) { equippedLube    = freeDefault.id; }
  if (cat==='content' && equippedContent === id) { equippedContent = freeDefault.id; }
  ownedGear.delete(id);
  pts += item.sell;
  renderEquipPanel(); renderStats(); renderShop(); save();
}

// ─────────────────────────────────────────────
//  Shop room
// ─────────────────────────────────────────────
let shopRoomTab = 'tool';

function openShopRoom(e) {
  e.stopPropagation(); // don't fire handleClick
  shopRoomTab = 'tool';
  document.getElementById('shop-room').classList.add('show');
  document.querySelectorAll('.sr-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === shopRoomTab));
  renderShopRoom();
  renderShopRoomPts();
}

function closeShopRoom() {
  document.getElementById('shop-room').classList.remove('show');
}

function setShopTab(tab) {
  shopRoomTab = tab;
  document.querySelectorAll('.sr-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === tab));
  renderShopRoom();
}

function renderShopRoomPts() {
  document.getElementById('sr-val-pts').textContent = fmt(pts);
}

function renderShopRoom() {
  const list = document.getElementById('sr-items');
  list.innerHTML = '';
  const items      = GEAR[shopRoomTab];
  const equippedId = shopRoomTab==='tool' ? equippedTool : shopRoomTab==='lube' ? equippedLube : equippedContent;

  const ownedItems = items.filter(i => ownedGear.has(i.id));
  if (ownedItems.length) {
    const dh = document.createElement('div'); dh.className='sr-divider'; dh.textContent='── INVENTORY ──'; list.appendChild(dh);
    ownedItems.forEach(item => {
      const isEq = item.id === equippedId;
      const div  = document.createElement('div');
      div.className = 'sr-item' + (isEq ? ' gear-active' : '');
      div.innerHTML =
        `<div class="sr-row1"><span class="sr-name">${item.name}</span><div class="sr-btns">` +
        (isEq ? `<span class="sr-cost" style="color:var(--green)">EQUIPPED</span>`
               : `<button class="gear-btn gear-equip-btn" onclick="equipGear('${shopRoomTab}','${item.id}');renderShopRoom();renderShopRoomPts()">EQUIP</button>`) +
        (!item.free ? `<button class="gear-btn gear-sell-btn" onclick="sellGear('${shopRoomTab}','${item.id}');renderShopRoom();renderShopRoomPts()">SELL +${fmt(item.sell)}</button>` : '') +
        `</div></div><div class="sr-desc">${item.desc}</div>`;
      list.appendChild(div);
    });
  }

  const shopItems = items.filter(i => !ownedGear.has(i.id) && !(i.locked && i.locked()));
  if (shopItems.length) {
    const ds = document.createElement('div'); ds.className='sr-divider'; ds.textContent='── FOR SALE ──'; list.appendChild(ds);
    shopItems.forEach(item => {
      const canBuy = pts >= item.cost;
      const div    = document.createElement('div');
      div.className = 'sr-item' + (!canBuy ? ' locked' : '');
      div.innerHTML =
        `<div class="sr-row1"><span class="sr-name">${item.name}</span>` +
        `<span class="sr-cost">${fmt(item.cost)} pts</span></div>` +
        `<div class="sr-desc">${item.desc}</div>`;
      if (canBuy) div.addEventListener('click', () => { buyGear(shopRoomTab, item.id); renderShopRoom(); renderShopRoomPts(); });
      list.appendChild(div);
    });
  }
}

function openGearSelect(cat) {
  const labels = { tool:'SELECT TOOL', lube:'SELECT LUBE', content:'SELECT CONTENT' };
  const equippedId = cat==='tool' ? equippedTool : cat==='lube' ? equippedLube : equippedContent;
  document.getElementById('gear-select-title').textContent = labels[cat];
  const list = document.getElementById('gear-select-list');
  list.innerHTML = '';
  GEAR[cat].filter(i => ownedGear.has(i.id)).forEach(item => {
    const isEq = item.id === equippedId;
    const div = document.createElement('div');
    div.className = 'gear-sel-item' + (isEq ? ' selected' : '');
    div.innerHTML = `<span class="gear-sel-name">${item.name}</span><span class="gear-sel-desc">${item.desc}</span>`;
    if (!isEq) div.addEventListener('click', () => { equipGear(cat, item.id); closeGearSelect(); });
    list.appendChild(div);
  });
  document.getElementById('gear-select-overlay').classList.add('show');
}

function closeGearSelect() {
  document.getElementById('gear-select-overlay').classList.remove('show');
}

function buy(id) { buyUpgrade(id); } // legacy alias

setInterval(save, 15000);

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
load();
updatePassiveAnim();
renderEquipPanel();
renderEffects();
renderStats();
renderStamina();
renderShop();
requestAnimationFrame(tick);
</script>
</body>
</html>
