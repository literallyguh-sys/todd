<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TODD'S WITNESSES — VIEW</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#060608;font-family:'VT323',monospace;}
body::after{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);}

#room{position:fixed;inset:0;z-index:0;
  background-image:url('room.jpeg');
  background-size:cover;background-position:center;}
#room::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(0,0,0,0.1) 0%,rgba(0,0,0,0.65) 100%);}

#back-btn{position:fixed;left:24px;bottom:24px;z-index:200;background:transparent;
  color:#FFD600;border:2px solid #FFD600;font-family:'VT323',monospace;font-size:18px;
  letter-spacing:2px;padding:8px 20px;cursor:pointer;text-decoration:none;display:inline-block;}
#back-btn:hover{background:#FFD600;color:#000;}

#transition{position:fixed;inset:0;z-index:9997;background:#000;opacity:0;pointer-events:none;transition:opacity 0.5s ease;}
#transition.fade-out{opacity:1;pointer-events:all;}
</style>
</head>
<body>
<div id="room"></div>
<div id="transition"></div>

<a id="back-btn" href="index.html">[ ← BACK ]</a>

</body>
</html>
